<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codey timeline</title>
  <style>
    @font-face { font-family:'Inter'; font-weight:400; font-display:swap; src:url('/fonts/Inter-400.woff2') format('woff2'); }
    @font-face { font-family:'Inter'; font-weight:600; font-display:swap; src:url('/fonts/Inter-600.woff2') format('woff2'); }
    @font-face { font-family:'Inter'; font-weight:700; font-display:swap; src:url('/fonts/Inter-700.woff2') format('woff2'); }
    @font-face { font-family:'W95FA'; font-display:swap; src:url('/fonts/W95FA.woff') format('woff'); }

    :root {
      /* ---- V9 color ---- */
      --bg:#0b0d11; --surf:#0f1318; --surf-h:#141a21; --line:#1f2733; --hair:#171d27; --inset:#0a0d13;
      /* ink ramp */
      --ink:#f1f4f9; --ink2:#c6cdd9; --body:#97a0af; --muted:#6b7482; --faint:#3c4452;
      /* live = green, only for the single thing happening right now */
      --live:#34d399; --live-ink:#7fe9c2; --live-dim:#246c54; --live-deep:#173f31;
      /* state */
      --warn:#e0a23a; --coral:#f0654f;
      /* ---- radius ---- */
      --r-sm:6px; --r-task:8px; --r-card:10px;
      /* ---- motion ---- */
      --ease:cubic-bezier(.2,.6,.2,1); --t-hover:.15s; --t-drawer:.24s;
      /* ---- layout (app-specific, not in V9 mockup) ---- */
      --topbar:52px; --titlerow:50px; --head:102px;

      /* ---- temporary aliases: old token names still used in component rules below.
              these will be removed task-by-task as call sites are migrated to V9 names. ---- */
      --card:var(--surf);
      /* accent is now a neutral bright-ink; mode colors are retired */
      --accent:var(--ink2); --accent-ink:var(--ink); --accent-rgb:198,205,217;
      --amber:var(--warn); --warn-ink:#f2c46b;
      --coral-ink:#ff9885;
      /* old success-green folds into live-green for now */
      --green:var(--live); --green-ink:var(--live-ink);
      /* per-hue spend/time/structure tokens all map to neutral ink */
      --violet:var(--ink2); --violet-dim:var(--muted); --violet-ink:var(--ink2);
      --teal:var(--ink2); --teal-dim:var(--muted); --teal-ink:var(--ink2);
      --sky:var(--ink2); --sky-dim:var(--muted); --sky-ink:var(--ink2);
      --info:var(--ink2); --info-ink:var(--ink2);
      --structure:var(--muted); --structure-ink:var(--ink2);
    }
    body.split { --titlerow:0px; --head:52px; }
    * { box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--ink);
      margin:0; line-height:1.45; -webkit-font-smoothing:antialiased; letter-spacing:-0.005em; }
    .disp { font-family:'W95FA','Inter',sans-serif; letter-spacing:.02em; }
    .tok, .num, .tot, .pwork b { font-variant-numeric:tabular-nums; }

    /* top bar */
    .topbar { display:flex; align-items:center; gap:12px; padding:13px 20px; border-bottom:1px solid var(--line);
      background:var(--surf); position:sticky; top:0; z-index:5; }
    .eyebrow { font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
    .wm { font-size:17px; color:var(--ink); }
    .sproj { display:inline-flex; align-items:center; gap:7px; }
    .ptag { font-size:11px; color:var(--ink2); background:var(--inset); border:1px solid var(--line); border-radius:6px; padding:2px 8px; }
    .cdot { width:9px; height:9px; border-radius:50%; flex:none; display:inline-block; }
    /* running dot pulses green - it marks the single live thing */
    .cdot.run { box-shadow:0 0 0 0 rgba(52,211,153,.5); animation:pp 1.8s infinite; }
    .livewrap { display:inline-flex; align-items:center; gap:9px; padding:5px 12px; border-radius:9px; border:1px solid var(--line); background:var(--inset); transition:border-color .3s, background .3s; }
    .eq { display:inline-flex; align-items:flex-end; gap:2px; height:13px; }
    /* live bars are green when running, grey when idle */
    .eq i { width:3px; background:var(--live); border-radius:1px; animation:bounce 1s ease-in-out infinite; }
    .eq i:nth-child(1){animation-delay:0s} .eq i:nth-child(2){animation-delay:.2s} .eq i:nth-child(3){animation-delay:.4s} .eq i:nth-child(4){animation-delay:.15s}
    @keyframes bounce { 0%,100%{height:4px} 50%{height:13px} }
    .livewrap b { font-size:12px; font-weight:700; color:var(--live-ink); } .livewrap span { font-size:11px; color:var(--body); }
    /* idle: calm neutral, so a still "0" never reads as frozen */
    .livewrap.idle { border-color:var(--hair); background:var(--inset); }
    .livewrap.idle .eq i { animation:none; height:4px; background:var(--faint); }
    .livewrap.idle b { color:var(--muted); } .livewrap.idle span { color:var(--muted); }

    /* title row: the session name gets its own line so long names breathe */
    .titlerow { display:flex; align-items:center; gap:11px; padding:9px 20px; border-bottom:1px solid var(--line);
      background:var(--surf); position:sticky; top:var(--topbar); z-index:4; }
    body.split .titlerow { display:none; }
    .titlerow .stitle { font-size:20px; font-weight:400; color:var(--ink); margin:0; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* current-terminal actions: always visible (so the affordance is obvious), brighten on hover */
    .titleacts { display:flex; gap:6px; flex:none; }
    .tact { font:inherit; font-size:12px; display:inline-flex; align-items:center; gap:5px; background:var(--inset);
      border:1px solid var(--line); color:var(--body); border-radius:7px; padding:4px 10px; cursor:pointer;
      transition:color .15s, border-color .15s, background .15s; }
    /* hover = brighter ink + line border, no hue */
    .tact:hover { color:var(--ink2); border-color:var(--line); background:var(--surf-h); }
    .tact.del:hover { color:var(--coral); border-color:rgba(240,101,79,.4); }
    .tact .tg { font-size:13px; line-height:1; }
    .titlerow .stitle-input { font:inherit; font-size:20px; background:var(--inset); border:1px solid var(--line);
      color:var(--ink); border-radius:7px; padding:3px 9px; min-width:280px; }
    .titlerow .stitle-input:focus { outline:none; border-color:var(--ink); }
    .toggle { margin-left:auto; display:flex; background:var(--inset); border:1px solid var(--line); border-radius:8px; padding:2px; }
    .toggle button { font:inherit; font-size:12px; padding:5px 13px; border:none; background:transparent; color:var(--muted); border-radius:6px; cursor:pointer; }
    /* ON state: brighter ink + subtle raised surface + inset border, no color fill */
    .toggle button.on { background:var(--surf-h); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }
    .jumplive { font:inherit; font-size:11px; color:var(--ink2); background:transparent; border:1px solid var(--line); border-radius:7px; padding:5px 10px; cursor:pointer; }

    /* three-zone layout */
    .cols { display:flex; align-items:flex-start; min-height:calc(100vh - var(--head)); }
    .rail { width:232px; flex:none; border-right:1px solid var(--line); padding:12px 10px; position:sticky; top:var(--head); align-self:stretch; max-height:calc(100vh - var(--head)); overflow-y:auto; }
    .rh { font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:0 0 9px 3px; font-weight:600; }
    /* sessions search + day headers */
    .railsearch { width:100%; margin:0 0 10px; background:var(--inset); border:1px solid var(--line); color:var(--ink);
      border-radius:8px; padding:7px 10px; font:inherit; font-size:12px; }
    .railsearch::placeholder { color:var(--muted); }
    .railsearch:focus { outline:none; border-color:var(--ink); }
    /* date range filter: a quiet disclosure so it never crowds the list */
    .datefilter { margin:0 0 10px; }
    .datefilter > summary { list-style:none; cursor:pointer; font-size:11px; color:var(--muted); padding:2px 3px;
      display:flex; align-items:center; gap:6px; user-select:none; }
    .datefilter > summary::-webkit-details-marker { display:none; }
    .datefilter > summary::before { content:"\25b8"; font-size:9px; color:var(--muted); }
    .datefilter[open] > summary::before { content:"\25be"; }
    .datefilter > summary:hover { color:var(--ink2); }
    /* active filter label reads as brighter ink, not a hue */
    .datefilter .on { color:var(--ink2); }
    /* From and To stack so neither input is ever clipped or needs sideways scrolling. */
    .daterow { display:flex; flex-direction:column; gap:8px; margin:8px 0 6px; }
    .dlab { font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600;
      display:flex; flex-direction:column; gap:4px; }
    .dinput { width:100%; background:var(--inset); border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:6px 8px;
      font:inherit; font-size:11.5px; color-scheme:dark; }
    .dinput:focus { outline:none; border-color:var(--line); }
    .dclear { font:inherit; font-size:10.5px; color:var(--muted); background:transparent; border:none; cursor:pointer; padding:2px 3px; }
    .dclear:hover { color:var(--ink2); }
    /* Sticky day dividers so the date a run of sessions belongs to stays visible while you scroll
       the list. A dot + count make each day legible at a glance instead of a faint label. */
    .dayhd { position:sticky; top:0; z-index:1; display:flex; align-items:center; gap:8px;
      font-size:9.5px; text-transform:uppercase; letter-spacing:.13em; color:var(--ink2); font-weight:700;
      margin:14px 0 6px; padding:5px 4px 6px 6px; background:var(--bg); border-bottom:1px solid var(--line); }
    /* day dot is muted - not an accent, just a visual marker */
    .dayhd::before { content:""; width:5px; height:5px; border-radius:50%; background:var(--muted); flex:none; }
    .dayhd .dcount { margin-left:auto; color:var(--muted); font-weight:600; font-size:9px;
      background:var(--surf); border:1px solid var(--line); border-radius:20px; padding:1px 7px; }
    .dayhd:first-of-type { margin-top:2px; }
    .sess { position:relative; padding:8px 10px; border-radius:8px; margin-bottom:4px; line-height:1.3; cursor:pointer; display:block; width:100%; text-align:left; border:none; background:transparent; color:var(--ink); font:inherit; }
    .sess:hover { background:var(--surf-h); }
    .sessrename { width:100%; display:flex; gap:5px; align-items:center; padding:5px 6px; }
    .sessrename input { flex:1; min-width:0; background:var(--inset); border:1px solid var(--line); color:var(--ink);
      border-radius:6px; padding:5px 7px; font:inherit; font-size:12px; }
    /* active session: raised surface + inset border; name brightens to ink, no hue */
    .sess.active { background:var(--surf-h); box-shadow:inset 0 0 0 1px var(--line); }
    .sess.active .sname { color:var(--ink); }
    .sess .sname { font-weight:600; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:7px; }
    .sess .smeta { color:var(--muted); font-size:9.5px; margin-top:3px; padding-left:16px; }
    .sess .rproj { color:var(--body); }
    /* live session dot is green - it marks the single running thing */
    .sdot { width:6px;height:6px;border-radius:50%;background:var(--live);flex:none;animation:pp 1.8s infinite; }
    /* pp keyframe: green pulse for live dots (cdot.run, sdot) */
    @keyframes pp { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.35)} 70%{box-shadow:0 0 0 3px rgba(52,211,153,0)} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0)} }

    .center { flex:1; min-width:0; padding:16px 20px; }
    .summary { width:210px; flex:none; border-left:1px solid var(--line); padding:16px 13px; position:sticky; top:var(--head); align-self:stretch; transition:width var(--t-drawer) var(--ease); }

    /* pill warning badge on a task row */
    .pill { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }
    .pill.amber { background:rgba(224,162,58,.12); color:var(--amber); }
    /* tasks inside split panes need no bottom margin (pane uses flex gap) */
    .pbody .task { margin-bottom:0; }

    /* per-prompt group: transparent positioning wrapper, no border/background/padding */
    .grp { position:relative; margin-bottom:28px; }
    /* .grp.live and .grp.following kept as JS hooks - no border/box styling here */
    /* keep neutral hover inside followed groups */
    .grp.following .rline.can:hover, .grp.following .rline.brow:hover { background:var(--surf-h); }
    .grp.following .rcpt .rhead:hover { background:var(--surf-h); }
    /* eyebrow kept for split-pane prompt strip (geyebrow.glive / geyebrow.gcancel) */
    .geyebrow { display:inline-flex; align-items:center; gap:7px; font-size:9px; letter-spacing:.15em;
      text-transform:uppercase; color:var(--accent); margin-bottom:6px; font-weight:700; }
    .geyebrow::before { content:""; width:5px; height:5px; border-radius:50%; background:currentColor; flex:none;
      box-shadow:0 0 8px rgba(var(--accent-rgb),.55); }
    .geyebrow.glive { color:var(--live); }
    .geyebrow.glive::before { display:none; }
    .geyebrow.gcancel { color:var(--warn); }
    .geyebrow.gcancel::before { box-shadow:none; }
    .geyebrow.glive .rdot { margin-right:1px; background:var(--live); animation:ppl 1.6s infinite; }
    .grpnote { color:var(--muted); font-size:11.5px; padding:8px 4px 2px; }
    .grpcancel { color:var(--warn); font-size:11.5px; font-weight:600; padding:8px 4px 2px; }
    /* echo: first sentence of the recap, for scanning a completed prompt */
    .gecho { font-size:12px; color:var(--body); line-height:1.5; margin-top:9px; padding:1px 0 1px 10px; border-left:2px solid var(--line); }
    /* the session timer in the sidebar still uses .running for its green ticking elapsed */
    .running { color:var(--live); font-weight:600; }
    .rdot { display:inline-block; width:6px;height:6px;border-radius:50%;background:var(--live);margin-right:4px;animation:pp 1.6s infinite;vertical-align:middle; }
    .timer { font-variant-numeric:tabular-nums; }

    /* receipt */
    .rcpt { margin-top:13px; background:var(--inset); border:1px solid var(--line); border-radius:9px; overflow:hidden; }
    .rhead { display:flex; align-items:center; gap:8px; padding:9px 14px; background:var(--inset); border-bottom:1px solid var(--hair); cursor:pointer; user-select:none; }
    .rhead:hover .ttl { color:var(--ink); }
    .rhead:focus-visible { outline:2px solid var(--ink); outline-offset:-2px; }
    .rhead .x { color:var(--muted); font-size:10px; width:10px; }
    .rhead .ttl { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink2); font-weight:600; }
    .rhead .colh { margin-left:auto; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .rhead .tot { color:var(--ink2); font-weight:600; font-size:12px; margin-left:14px; }
    .rline { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--hair); transition:background .15s; }
    .rline.can, .rline.brow { cursor:pointer; }
    .rline.can:hover, .rline.brow:hover, .rline.lo { background:var(--surf-h); }
    /* a burst: one row standing in for a run of same-kind steps, expanding to the real rows */
    .tag.steps { background:var(--surf-h); color:var(--ink2); border:1px solid var(--line); }
    .bchildren { margin-left:18px; border-left:2px solid var(--line); }
    .bchildren .rline { padding-left:14px; }
    .bchildren .ldetail, .bchildren .failnote { padding-left:47px; }
    .lchev { width:9px; flex:none; color:var(--muted); font-size:9px; }
    .rline.lo .lchev { color:var(--ink2); }
    .lchev.sp { visibility:hidden; }
    /* plain pips are quiet; thinking is neutral too - only failure and the live step use color */
    .sw { width:6px;height:6px;border-radius:2px;background:var(--faint);flex:none; }
    .sw.think { background:var(--muted); }
    .sw.fail { background:var(--coral); box-shadow:0 0 7px rgba(240,101,79,.5); }
    .lbl { flex:1; font-size:12.5px; color:var(--ink2); }
    .tag { font-size:10px; font-family:ui-monospace,monospace; padding:2px 7px; border-radius:5px; flex:none; }
    .tag.tool { background:var(--surf-h); color:var(--ink2); border:1px solid var(--line); }
    .tag.think { background:var(--surf-h); color:var(--muted); border:1px solid var(--line); }
    .num { width:64px; text-align:right; font-size:12.5px; color:var(--ink2); font-weight:500; }
    .st { width:20px; text-align:right; font-size:11px; color:var(--muted); }
    /* done checks are muted - green is only for the live state */
    .st.ok { color:var(--muted); }
    .st.fail { color:var(--coral); font-weight:600; }
    /* the step Claude is on right now: green inset bar, green-tinted surface, green text */
    .rline.cur { background:rgba(52,211,153,.10); border-radius:6px; box-shadow:inset 3px 0 0 var(--live); animation:livepulse 2.6s ease-in-out infinite; }
    .rline.cur .lbl { color:var(--live-ink); font-weight:700; }
    .rline.cur .sw { background:var(--live); animation:ppl 2s infinite; }
    .rline.cur .st { color:var(--live); }
    @keyframes livepulse { 0%,100% { background:rgba(52,211,153,.10); } 50% { background:rgba(52,211,153,.07); } }
    /* green pulse ring for any dot/pip marking the live instant */
    @keyframes ppl { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.35)} 70%{box-shadow:0 0 0 3px rgba(52,211,153,0)} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0)} }
    @media (prefers-reduced-motion: reduce) { .rline.cur { animation:none; } }
    .curpip { width:6px; height:6px; border-radius:50%; background:var(--live); animation:ppl 1.4s infinite; flex:none; }
    /* plain-English failure note, shown inline under a failed line */
    .failnote { padding:0 14px 9px 47px; margin-top:-4px; border-bottom:1px solid var(--hair); font-size:11.5px; color:var(--coral); background:rgba(240,101,79,.04); }
    .failnote .note { color:var(--muted); }
    /* expanded per-line detail: raw command/path + why + raw error */
    .ldetail { padding:4px 14px 12px 47px; border-bottom:1px solid var(--hair); display:flex; flex-direction:column; gap:7px; }
    .ld { display:flex; gap:9px; align-items:baseline; }
    .ld .lk { flex:none; width:72px; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding-top:2px; }
    .ld code { font-family:ui-monospace,monospace; font-size:11.5px; color:var(--ink2); background:var(--inset); border:1px solid var(--line); border-radius:6px; padding:5px 8px; white-space:pre-wrap; word-break:break-word; flex:1; }
    .ld .lv { font-size:12px; color:var(--body); line-height:1.5; flex:1; }
    .ld.err code { color:var(--coral); border-color:rgba(240,101,79,.28); background:rgba(240,101,79,.05); }
    /* background context, JS-toggled so it survives the live refresh */
    .ctx { border-top:1px solid var(--line); }
    .ctxsum { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; user-select:none; }
    .ctxsum:focus-visible { outline:2px solid var(--ink); outline-offset:-2px; }
    .ctxsum .cx { color:var(--muted); font-size:10px; width:10px; }
    .ctx.open .ctxsum .cx { color:var(--ink2); }
    .ctxsum .ctt { font-size:11px; color:var(--muted); letter-spacing:.03em; }
    .ctxsum .ctot { margin-left:auto; color:var(--muted); font-size:11px; }
    .ctx .note { padding:2px 14px 11px 32px; font-size:10.5px; color:var(--body); line-height:1.55; max-width:640px; }

    /* ===== V9 companion sidebar ===== */
    .summary.collapsed { width:44px; }

    .sidehd { display:flex; align-items:center; gap:8px; margin-bottom:13px; }
    .sidehd .t { flex:1; font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink2); font-weight:700; white-space:nowrap; overflow:hidden; }
    .sidehd .tog { flex:none; width:26px; height:26px; border-radius:var(--r-sm); border:1px solid var(--line); background:var(--surf); color:var(--muted);
      display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;
      transition:color var(--t-hover), border-color var(--t-hover); font:inherit; }
    .sidehd .tog:hover { color:var(--ink2); border-color:var(--muted); }

    /* collapse: hide body, stack header vertically showing only the toggle */
    .summary.collapsed .statsbody { opacity:0; pointer-events:none; height:0; overflow:hidden; }
    .summary.collapsed .sidehd { flex-direction:column; }
    .summary.collapsed .sidehd .t { display:none; }
    .statsbody { transition:opacity var(--t-hover) var(--ease); }

    /* V9 scard: flat surface, single border, consistent radius */
    .scard { background:var(--surf); border:1px solid var(--line); border-radius:var(--r-card); padding:12px 13px; margin-bottom:10px; }
    .scard .k { font-size:8.5px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:10px; }

    /* "Right now" card: live-deep border when live */
    .nowcard { border-color:var(--live-deep); }
    .nowcard .stat { display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--live); }
    .nowcard .stat .d { width:8px; height:8px; border-radius:50%; background:var(--live); box-shadow:0 0 6px rgba(52,211,153,.5); animation:softpulse 2.8s ease-in-out infinite; flex:none; }
    .nowcard .doing { font-size:12.5px; color:var(--ink); font-weight:600; margin-top:9px; line-height:1.35; }
    .nowcard .el { font-size:10.5px; color:var(--muted); margin-top:4px; }

    /* session progress bar inside the now card */
    .prog { margin-top:11px; }
    .prog .pl { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:5px; }
    .prog .pl b { color:var(--body); font-weight:600; }
    .prog .bar { height:4px; border-radius:2px; background:var(--inset); overflow:hidden; }
    .prog .bar i { display:block; height:4px; border-radius:2px; background:var(--live-dim); }

    /* "This session" stat pairs */
    .pair { display:flex; align-items:baseline; justify-content:space-between; padding:6px 0; font-size:11.5px; }
    .pair + .pair { border-top:1px solid var(--hair); }
    .pair .l { color:var(--body); }
    .pair .v { color:var(--ink2); font-weight:600; }
    .pair .v .dim { color:var(--muted); font-weight:500; }

    /* token breakdown rows */
    .brk { margin-top:13px; display:flex; flex-direction:column; gap:9px; }
    .brkrow .top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
    .brkrow .bn { font-size:11px; color:var(--body); }
    .brkrow .bv { font-size:11px; color:var(--ink2); }
    .brkrow .bv .pct { color:var(--muted); margin-left:5px; }
    .brkrow .tr { height:4px; border-radius:2px; background:var(--inset); overflow:hidden; }
    /* neutral fill for breakdown bars - these are historical data, not the live action */
    .brkrow .tr i { display:block; height:4px; border-radius:2px; background:var(--body); }

    /* live NOW strip: what Claude is on right now, sticky at the top of the single view. Framed
       in green with a soft glow - unmistakably the live element on the page. */
    .nowstrip { position:sticky; top:calc(var(--head) + 8px); z-index:3; margin-bottom:14px;
      background:linear-gradient(180deg,#0e1a15,#0b1410); border:1px solid var(--live-dim); border-radius:12px;
      padding:11px 14px; box-shadow:0 8px 22px rgba(0,0,0,.38), 0 0 22px rgba(52,211,153,.10); }
    .nowstrip .nowtop { display:flex; align-items:center; gap:10px; }
    .nowstrip .neye { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:#0b1410;
      font-weight:800; display:inline-flex; align-items:center; gap:6px; flex:none;
      background:var(--live); border-radius:6px; padding:3px 8px; }
    .nowstrip .ndot { width:7px; height:7px; border-radius:50%; background:#0b1410; animation:pp 1.6s infinite; }
    /* the tool the current step is using: a tight green-tinted mono tag */
    .nowstrip .ntool { flex:none; font-family:ui-monospace,monospace; font-size:11px; color:var(--live-ink);
      background:rgba(52,211,153,.10); border:1px solid rgba(52,211,153,.28); border-radius:6px; padding:2px 8px; }
    .nowstrip .nact { font-size:14.5px; font-weight:600; color:var(--ink); flex:1; min-width:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nowstrip .nact.think { color:var(--ink2); }
    .nowstrip .ntime { font-variant-numeric:tabular-nums; color:var(--live-ink); font-size:13px; flex:none; }
    .nowstrip .follow { flex:none; font:inherit; font-size:11.5px; display:inline-flex; align-items:center; gap:6px;
      background:var(--inset); border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:5px 11px; cursor:pointer; }
    .nowstrip .follow.on { background:rgba(52,211,153,.14); color:var(--live-ink); border-color:rgba(52,211,153,.42); }
    .nowstrip .follow .fd { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .nowstrip .ntrail { display:flex; flex-wrap:wrap; align-items:center; gap:4px 14px; margin-top:9px; font-size:11.5px; color:var(--body); }
    .nowstrip .ntrail .lab { color:var(--muted); letter-spacing:.06em; text-transform:uppercase; font-size:9px; font-weight:600; }
    .nowstrip .ntrail .k { color:var(--live); } .nowstrip .ntrail .k.f { color:var(--coral); }
    @media (prefers-reduced-motion: reduce) { .nowstrip .ndot { animation:none; } }

    /* depth + summaries controls in the title row */
    .tlctl { margin-left:auto; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .ctlgrp { display:flex; align-items:center; gap:7px; }
    .ctlgrp .cl { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600; }
    .seg { display:flex; background:var(--inset); border:1px solid var(--line); border-radius:8px; padding:2px; }
    .seg button { font:inherit; font-size:11.5px; padding:4px 11px; border:none; background:transparent; color:var(--muted); border-radius:6px; cursor:pointer; }
    /* ON state: monochrome raised surface, no hue fill */
    .seg button.on { background:var(--surf-h); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }
    .budgetcue { font-size:10.5px; color:var(--muted); }
    .budgetcue.low { color:var(--warn); }

    /* generated why/how panel inside an open task card */
    .expla { margin-top:13px; border:1px solid var(--line); background:var(--surf); border-radius:var(--r-card); padding:12px 14px; }
    .expla .et { font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:7px; margin-bottom:7px; }
    .expla .etext { font-size:13px; color:var(--ink2); line-height:1.62; white-space:pre-wrap; }
    .expla .edepth { color:var(--muted); font-weight:600; letter-spacing:.08em; }
    .genwrap { margin-top:13px; }
    .genbtn { font:inherit; font-size:12.5px; font-weight:600; color:var(--ink2); background:var(--surf-h); border:1px solid var(--line); border-radius:9px; padding:9px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
    .genbtn:hover { background:var(--inset); border-color:var(--muted); }
    .genbtn .ic { font-size:12px; }
    .genhint { font-size:10.5px; color:var(--muted); margin-top:8px; }
    .gening { font-size:12.5px; color:var(--body); display:inline-flex; align-items:center; gap:9px; }
    .expla .gening, .genwrap .gening, .recap .gening { margin-top:0; }
    /* generation spinner: neutral, not green - this is a generation wait, not a live step */
    .spin { width:12px; height:12px; border:2px solid var(--line); border-top-color:var(--ink2); border-radius:50%; animation:spin .7s linear infinite; flex:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .gpaused { margin-top:13px; font-size:12px; color:var(--body); background:var(--surf); border:1px solid var(--line); border-radius:9px; padding:10px 12px; line-height:1.55; }
    .gpaused b { color:var(--warn); }

    /* per-action explain control, inside the expanded line detail */
    .whybtn { font:inherit; font-size:11px; font-weight:600; color:var(--ink2); background:var(--surf-h); border:1px solid var(--line); border-radius:7px; padding:4px 11px; cursor:pointer; }
    .whybtn:hover { background:var(--inset); border-color:var(--muted); }
    .ld .lv.gen { color:var(--ink2); }

    /* closing recap on a prompt group */
    .recap { margin-top:13px; background:var(--inset); border:1px solid var(--line); border-radius:var(--r-card); padding:11px 13px; }
    .recap .rt { font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:7px; margin-bottom:6px; }
    .recap .rt .ic { color:var(--ink2); }
    .recap .rx { font-size:12.5px; color:var(--ink2); line-height:1.6; }
    .recap .pend { font-size:12px; color:var(--muted); }
    .recap .pend.warn { color:var(--warn); }

    /* intervention bar (Plan 3): a warning surface - amber frame, amber CTA, neutral body */
    .intervene { margin:12px 0 2px; border:1px solid rgba(224,162,58,.4); background:var(--surf); border-radius:10px; padding:12px 14px; }
    .intervene-head { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--warn-ink); margin-bottom:10px; }
    .intervene-head .ico { color:var(--warn); }
    .intervene .mono { font-family:ui-monospace,monospace; font-size:12px; color:var(--body); }
    .intervene-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .ibtn { border:1px solid var(--line); background:var(--surf-h); color:var(--ink2); border-radius:8px; padding:8px 14px; font:inherit; font-size:13px; font-weight:500; cursor:pointer; }
    /* primary CTA: readable amber on dark */
    .ibtn.primary { background:var(--warn); color:var(--bg); border:none; font-weight:700; }
    .ibtn.ghost { border-color:var(--line); color:var(--muted); }
    .ibtn:not(.primary):hover { border-color:var(--muted); }
    .ibtn:disabled { opacity:.5; cursor:default; }
    .intervene-note { font-size:11.5px; color:var(--muted); margin-top:9px; }
    /* confirmation, not a live state - neutral ink, no green */
    .intervene-after .sent { color:var(--ink2); font-weight:600; font-size:13px; }
    .intervene-after .do { color:var(--muted); font-size:12.5px; margin:8px 0; }
    .intervene-after .copy { display:flex; align-items:center; gap:8px; background:var(--inset); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    .intervene-after .copy code { flex:1; font-family:ui-monospace,monospace; font-size:12.5px; color:var(--ink2); word-break:break-word; }
    .copybtn { flex:none; background:var(--surf); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:4px 10px; font:inherit; font-size:12px; cursor:pointer; }
    .copybtn:hover { border-color:var(--muted); }

    .empty { color:var(--muted); padding:48px 0; text-align:center; }

    /* ===== V9 feed spine ===== */
    .feed { position:relative; padding-left:27px; }
    .feed::before { content:""; position:absolute; left:6px; top:7px; bottom:8px; width:1px;
      background:linear-gradient(180deg,transparent,var(--line) 18px,var(--line) calc(100% - 28px),transparent); }

    /* ===== V9 prompt chapter marker ===== */
    .pmark { position:relative; margin-top:28px; }
    .pmark:first-child { margin-top:0; }
    /* spine node for prompts - scoped to .feed so split panes are unaffected */
    .feed .pmark::before { content:""; position:absolute; left:-24.5px; top:3px; width:9px; height:9px; border-radius:50%;
      background:var(--bg); border:2px solid var(--faint); }
    .feed .pmark.live::before { border-color:var(--live); box-shadow:0 0 0 3px var(--bg), 0 0 7px rgba(52,211,153,.45); }
    .geye { display:inline-flex; align-items:center; gap:6px; font-size:9px; letter-spacing:.15em; text-transform:uppercase;
      font-weight:700; color:var(--muted); margin-bottom:6px; }
    .geye.live { color:var(--live); }
    .geye .geye-dot { width:5px; height:5px; border-radius:50%; background:var(--live); box-shadow:0 0 6px var(--live); animation:softpulse 2.8s ease-in-out infinite; }
    .gtext { font-size:16px; font-weight:600; color:var(--ink); line-height:1.32; letter-spacing:-0.012em;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .pmeta { margin-top:6px; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .pmeta .s { color:var(--faint); margin:0 7px; }
    .pmeta b { color:var(--body); font-weight:600; }
    .nodes { margin-top:11px; display:flex; flex-direction:column; gap:4px; }

    /* ===== V9 task row ===== */
    .task { position:relative; display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:var(--r-task);
      cursor:pointer; background:var(--surf); border:1px solid transparent;
      transition:background var(--t-hover) var(--ease), border-color var(--t-hover) var(--ease),
        transform var(--t-hover) var(--ease), box-shadow var(--t-hover) var(--ease); }
    .task:hover { background:var(--surf-h); border-color:var(--line); transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.26); }
    /* spine node for tasks - scoped to .feed only */
    .feed .task::before { content:""; position:absolute; left:-21.5px; top:50%; transform:translateY(-50%);
      width:7px; height:7px; border-radius:50%; background:var(--bg); border:1.5px solid var(--faint);
      box-shadow:0 0 0 3px var(--bg); transition:border-color var(--t-hover) var(--ease); }
    .feed .task:hover::before, .feed .task.open::before { border-color:var(--muted); }
    .task .nm { flex:1; min-width:0; font-size:13px; color:var(--ink2); font-weight:500;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .task .rmeta { flex:none; width:auto; font-size:10.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .task .rtok { flex:none; width:auto; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .task .rtok::before { content:"\2022"; color:var(--faint); margin-right:9px; }
    .task .rtok::after { content:" tok"; color:var(--faint); }
    .task .go { flex:none; width:10px; text-align:center; color:var(--faint); font-size:12px;
      transition:color var(--t-hover) var(--ease), transform var(--t-hover) var(--ease); }
    .task:hover .go { color:var(--muted); transform:translateX(2px); }
    .task.open .go { transform:rotate(90deg); color:var(--ink2); }
    /* open and live tasks wrap so the body flows beneath the row */
    .task.open, .task.live { flex-wrap:wrap; }
    .tbody { width:100%; }
    /* narration lead line at the top of the expanded body */
    .tlead { font-size:12px; color:var(--body); margin:6px 0 2px; line-height:1.45; }
    /* live task accent: dim inset on the left */
    .task.live { background:var(--surf-h); box-shadow:inset 2px 0 0 var(--live-deep); }
    .task.live:hover { box-shadow:inset 2px 0 0 var(--live-dim), 0 4px 14px rgba(0,0,0,.26); }
    /* live spine node - scoped to .feed */
    .feed .task.live::before { border-color:var(--live); box-shadow:0 0 0 3px var(--bg), 0 0 5px rgba(52,211,153,.3); animation:softpulse 2.8s ease-in-out infinite; }
    .task.live .nm { color:var(--ink); font-weight:600; }
    /* live badge pill */
    .livetag { flex:none; font-size:8.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      padding:1px 8px; border-radius:999px; color:var(--live-ink); border:1px solid var(--live-dim); background:rgba(52,211,153,.05); }
    /* green running timer for live tasks - weight 400 (override the global .running 600) */
    .rmeta.running { color:var(--live); font-weight:400; }
    @keyframes softpulse { 0%,100% { box-shadow:0 0 0 3px var(--bg), 0 0 0 0 rgba(52,211,153,0) } 50% { box-shadow:0 0 0 3px var(--bg), 0 0 6px rgba(52,211,153,.32) } }

    /* Active Terminals: two full-size terminals side by side, paged. Each pane keeps the full
       height of the row and scrolls its own breakdowns, so a busy terminal never squishes its
       neighbour. The controls (pager, hidden tray) stay pinned above the row. */
    .splitwrap { display:flex; flex-direction:column; gap:10px; height:calc(100vh - var(--head) - 32px); }
    .tstack { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:14px; flex:1; min-height:0; }
    /* A lone terminal on the last page stretches across both columns instead of leaving a gap. */
    .tstack.solo { grid-template-columns:minmax(0,1fr); }
    .pane { position:relative; background:var(--surf); border:1px solid var(--line); border-radius:11px; overflow:hidden; display:flex; flex-direction:column; min-height:0; height:100%; }
    /* running pane: green frame + beam - green is live/active only */
    .pane.run { border-color:var(--live-dim); }
    .pane.run::before { content:""; position:absolute; inset:0; border-radius:11px; padding:1px; pointer-events:none;
      background:linear-gradient(110deg,transparent 25%,var(--live) 50%,transparent 75%); background-size:200% 100%;
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:beam 3s linear infinite; opacity:.5; }
    .phead { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line); background:var(--inset); flex-wrap:wrap; }
    .phead .pname { font-weight:600; font-size:12.5px; color:var(--ink); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .phead .pproj { font-size:10px; color:var(--body); background:var(--surf-h); border:1px solid var(--line); border-radius:5px; padding:1px 6px; }
    .phead .pwork { font-size:10px; color:var(--muted); } .phead .pwork b { color:var(--ink2); }
    /* cancelled pane: quiet amber frame, no beam - not running, just interrupted */
    .pane.cancelled { border-color:rgba(224,162,58,.4); }
    /* Pinned prompt strip: echoes the single view's "You asked" heading at the top of a pane and
       stays put while the body scrolls. Clamped to a few lines so a long prompt never crowds out
       the breakdowns below it. */
    .pprompt { flex:none; padding:9px 12px; border-bottom:1px solid var(--line); background:var(--inset); }
    .pprompt .geyebrow { margin-bottom:4px; }
    .pprompt .geyebrow.gcancel { color:var(--warn); }
    .pptext { font-size:12.5px; font-weight:600; color:var(--ink); line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    /* badge: neutral chip; thinking is also neutral (not violet) */
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:9.5px; font-weight:600; color:var(--ink2); background:var(--surf-h); border:1px solid var(--line); }
    .badge.think { color:var(--body); background:var(--surf-h); border-color:var(--line); }
    /* a calm note for a terminal that answered with no tools, or has not acted yet: not an error,
       not dimmed-to-save-tokens (the live view costs nothing), just an honest state line. */
    .pnote { margin:auto; padding:22px 14px; text-align:center; color:var(--muted); font-size:12px; line-height:1.5; }
    .pnote .pn1 { color:var(--ink2); font-weight:600; display:block; margin-bottom:3px; }
    /* thinking pip is green - it marks a live thinking moment, same as the running pip */
    .pthink { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--body); padding:10px 11px; }
    .pthink .pip { width:6px;height:6px;border-radius:50%;background:var(--live);animation:pp 1.4s infinite; }
    /* dismiss (X) to hide a terminal from the grid; non-destructive, restorable below */
    .pdismiss { flex:none; width:20px; height:20px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
      border:1px solid var(--line); background:var(--inset); color:var(--muted); border-radius:6px; cursor:pointer; font-size:13px; }
    .pdismiss:hover { color:var(--coral); border-color:rgba(240,101,79,.4); }
    /* the "Hidden (N)" tray under the grid, listing dismissed terminals with a restore action */
    .hiddentray { display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:7px 2px 0; font-size:11px; color:var(--muted); }
    .hiddentray .htlab { letter-spacing:.04em; }
    .hidchip { display:inline-flex; align-items:center; gap:7px; padding:4px 9px; border-radius:8px; background:var(--surf); border:1px solid var(--line); color:var(--ink2); }
    .hidchip .hcdot { width:7px; height:7px; border-radius:50%; flex:none; }
    .hidchip button { font:inherit; font-size:10.5px; color:var(--ink2); background:transparent; border:none; cursor:pointer; padding:0; }
    .hidchip button:hover { text-decoration:underline; }
    /* Each pane scrolls on its own, so one busy terminal never crushes the others. min-height:0
       lets the flex child actually shrink and hand its overflow to this scroller. */
    .pbody { padding:9px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1 1 0; min-height:0;
      scrollbar-width:thin; scrollbar-color:var(--line) transparent; }
    .pbody::-webkit-scrollbar { width:9px; }
    .pbody::-webkit-scrollbar-thumb { background:var(--surf-h); border-radius:5px; border:2px solid var(--surf); }
    .pbody::-webkit-scrollbar-thumb:hover { background:var(--line); }
    /* task card inside a pane: neutral surface, V9 border */
    .ptc { background:var(--surf-h); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    /* current task in a pane gets a green left edge - it is the live task */
    .ptc.cur { background:var(--surf-h); border-color:var(--live-dim); box-shadow:inset 2px 0 0 var(--live-dim); }
    .ptcr { display:flex; align-items:flex-start; gap:8px; }
    .ptcr .pn { flex:1; min-width:0; } .ptcr .pn b { font-size:11.5px; font-weight:600; color:var(--ink2); }
    .ptcr .pn span { display:block; font-size:9.5px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* chip: neutral, no violet */
    .pchip { display:inline-flex; align-items:baseline; gap:3px; padding:3px 7px; border-radius:7px; border:1px solid var(--line); background:var(--surf-h); flex:none; }
    .pchip b { font-size:11px; font-weight:700; color:var(--ink2); } .pchip small { font-size:8px; color:var(--muted); }
    /* running line: green text - it marks the live step */
    .prun { display:flex; align-items:center; gap:6px; font-size:9.5px; color:var(--live-ink); padding-top:4px; }
    .prun .pip { width:5px;height:5px;border-radius:50%;background:var(--live);animation:ppl 1.4s infinite; }
    .pager { display:flex; align-items:center; justify-content:center; gap:14px; padding:6px; flex:none; }
    /* pager nav: monochrome, no hue on hover */
    .pager .nav { width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--surf);color:var(--ink2);font:inherit;font-size:13px;cursor:pointer; }
    .pager .nav:hover { border-color:var(--muted); color:var(--ink); }
    .pager .nav:disabled { opacity:.4; cursor:default; }
    /* dots: monochrome; the active dot uses ink2 (not live/accent) - page indicator, not a live state */
    .dots { display:flex; gap:6px; } .dot { width:7px;height:7px;border-radius:50%;background:var(--surf-h);border:1px solid var(--line); }
    .dot.on { background:var(--ink2); border-color:var(--ink2); box-shadow:none; }
    .prange { font-size:11.5px; color:var(--ink2); font-weight:500; }

    @keyframes beam { to { background-position:-200% 0; } }

    /* focus rings: visible on keyboard navigation, 2px ink outline, offset so it floats above the surface */
    .task:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
    .sidehd .tog:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }

    /* reduced-motion: kill all animations and key transitions broadly, then keep existing specifics */
    @media (prefers-reduced-motion: reduce) {
      * { animation:none !important; }
      .task, .task .go, .summary, .statsbody, .tact, .toggle button, .seg button,
      .rline.cur, .nowstrip .ndot { transition:none !important; }
      /* keep these selectors for clarity even though * covers them */
      .eq i, .sdot, .cdot.run, .pane.run::before, .prun .pip { animation:none; transition:none; }
      .geye .geye-dot, .feed .pmark.live::before, .feed .task.live::before { animation:none; }
    }
    @media (max-width: 1000px) {
      .summary { display:none; }
    }
    @media (max-width: 680px) {
      .rail { display:none; }
      .rline .tag { display:none; }
    }
  </style>
</head>
<body data-mode="deep">
  <div class="topbar">
    <span class="eyebrow disp">Codey Timeline</span>
    <span class="livewrap idle" id="livewrap"><span class="eq"><i></i><i></i><i></i><i></i></span><b id="livecount">0</b><span id="livelabel">idle</span></span>
    <div class="toggle">
      <button id="tb-single" class="on" type="button">Single terminal</button>
      <button id="tb-split" type="button">Active terminals</button>
    </div>
    <button id="jumplive" class="jumplive" type="button" hidden>Jump to live</button>
  </div>

  <div class="titlerow" id="titlerow">
    <span class="sproj" id="sproj"></span>
    <h1 class="stitle disp" id="sname">Codey</h1>
    <span class="titleacts">
      <button class="tact" id="rename-current" type="button" title="Rename this terminal" aria-label="Rename this terminal"><span class="tg">&#9998;</span> Rename</button>
      <button class="tact del" id="delete-current" type="button" title="Delete this terminal" aria-label="Delete this terminal"><span class="tg">&#128465;</span> Delete</button>
    </span>
    <div class="tlctl" id="tlctl"></div>
  </div>

  <div class="cols">
    <aside class="rail" id="rail" aria-label="Sessions"></aside>
    <main class="center">
      <div id="nowstrip" class="nowstrip" hidden></div>
      <div id="main"></div>
    </main>
    <aside class="summary" id="summary"></aside>
  </div>

  <script>
    const fmt = (n) => Number(n || 0).toLocaleString();
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const kfmt = (n) => {
      if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
      return String(n);
    };
    function ago(ms) {
      if (!ms) return "";
      const s = Math.max(0, Math.floor((Date.now() - ms) / 1000));
      if (s < 60) return "just now";
      if (s < 3600) return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }
    // Matches the TS formatDuration: "45s", "3m 12s", "1h 04m".
    function fmtDur(ms) {
      const total = Math.max(0, Math.round(ms / 1000));
      if (total < 60) return (total || 1) + "s";
      const m = Math.floor(total / 60), s = total % 60;
      if (m < 60) return s ? m + "m " + s + "s" : m + "m";
      const h = Math.floor(m / 60), rm = m % 60;
      return h + "h " + String(rm).padStart(2, "0") + "m";
    }
    const fmtClock = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
    const fmtClockSec = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }) : "";
    // A live, ticking elapsed span (updated by the 1s ticker); used for running tasks/groups.
    const liveTimer = (sinceTs) => `<span class="timer" data-since="${sinceTs}">${fmtDur(Date.now() - sinceTs)}</span>`;

    const open = new Set();        // chunk ids the user manually expanded
    const closedByUser = new Set();// live chunk ids the user manually collapsed (overrides auto-open)
    let liveOpenId = null;         // the running task, auto-opened so its current step shows
    const lineOpen = new Set();    // expanded work lines, key "chunkId:idx"
    const burstOpen = new Set();   // expanded bursts (runs of same-activity steps), key "chunkId|bStart"
    const workCollapsed = new Set();// folded work lists, by chunk id (default expanded)
    const confirmed = new Map();   // chunk id -> intervention action (survives the live re-render)
    let view = "single";           // "single" | "split"
    let currentId = new URLSearchParams(location.search).get("session");
    let pinned = !!currentId;      // a manual pick stops follow-newest
    let splitPage = 1;
    let splitPinned = false;
    let lastSessions = [];         // last /api/sessions payload, for search re-render without refetch
    let railFilter = "";           // sidebar search text
    let dateFrom = "";             // sidebar date filter, lower bound (YYYY-MM-DD, "" = open)
    let dateTo = "";               // sidebar date filter, upper bound (YYYY-MM-DD, "" = open)
    let railWired = false;         // the rail shell (search + date inputs) is built once, then reused
    let renamingId = null;         // session id being renamed inline (pauses rail refresh)
    let statsCollapsed = localStorage.getItem("codey-stats-collapsed") === "1"; // sidebar collapse state

    // ---- Explanations: generated why/how and per-prompt summaries ----
    const explCache = new Map();   // "scope|id|depth" -> generated text (survives the live refresh)
    const explLoading = new Set(); // keys currently generating
    const autoFired = new Set();   // summary keys Auto has already requested, so it fires once per depth
    let budgetPaused = false;      // a generation hit the budget cap
    let depth = localStorage.getItem("codey-depth");   // null until seeded from the snapshot mode
    let genMode = localStorage.getItem("codey-gen");   // "auto" | "saver", null until seeded
    let lastSnap = null;           // last single-view snapshot, for re-render after a generation
    let liveNow = false;           // a session is actively running, so poll faster
    const curDepth = () => depth || "deep";
    // Re-tint the whole page to the active narration mode by swapping <body data-mode>. Simple,
    // Deep and Teach each drive a different --accent, so the chrome reads as the mode you are in.
    const applyMode = () => { document.body.dataset.mode = curDepth(); };
    applyMode();
    const ekey = (scope, id) => scope + "|" + id + "|" + curDepth();
    const firstSentence = (t) => String(t).split(/(?<=[.?!])\s+/)[0] || String(t);

    async function generate(scope, id) {
      if (!currentId) return;
      const key = ekey(scope, id);
      if (explCache.has(key) || explLoading.has(key)) return;
      explLoading.add(key);
      if (lastSnap) renderSingle(lastSnap);
      try {
        const res = await fetch("/api/session/" + encodeURIComponent(currentId) + "/explain", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ scope, id, depth: curDepth() }),
        });
        const data = await res.json();
        if (data && data.paused) budgetPaused = true;
        else if (data && data.text) { explCache.set(key, data.text); budgetPaused = false; }
      } catch { /* leave the button so the user can retry */ }
      explLoading.delete(key);
      if (lastSnap) renderSingle(lastSnap);
    }

    // Pre-load any explanations the snapshot already carries (cached at the seed depth), so a
    // reopened timeline shows them without a round-trip. Never clobber a fresher client value.
    function seedEmbedded(snap) {
      const sd = snap.seedDepth || "deep";
      for (const c of snap.chunks || []) {
        if (c.explanation) { const k = "task|" + c.id + "|" + sd; if (!explCache.has(k)) explCache.set(k, c.explanation); }
      }
      for (const g of snap.groups || []) {
        if (g.summary) { const k = "summary|" + g.id + "|" + sd; if (!explCache.has(k)) explCache.set(k, g.summary); }
      }
    }

    function renderControls(snap) {
      const el = document.getElementById("tlctl");
      if (!el) return;
      const seg = (val, cur, label) => `<button data-val="${val}" class="${val === cur ? "on" : ""}" type="button">${label}</button>`;
      const cue = snap.budgetLeft
        ? `<span class="budgetcue${/reach/.test(snap.budgetLeft) ? " low" : ""}">${esc(snap.budgetLeft)}</span>` : "";
      el.innerHTML =
        `<div class="ctlgrp"><span class="cl">Depth</span><div class="seg" id="seg-depth">`
        + seg("simple", curDepth(), "Simple") + seg("deep", curDepth(), "Deep") + seg("teach", curDepth(), "Teach") + `</div></div>`
        + `<div class="ctlgrp"><span class="cl">Summaries</span><div class="seg" id="seg-gen">`
        + seg("auto", genMode, "Auto") + seg("saver", genMode, "Saver") + `</div></div>`
        + cue;
      el.querySelectorAll("#seg-depth button").forEach((b) => b.addEventListener("click", () => {
        depth = b.dataset.val; localStorage.setItem("codey-depth", depth); autoFired.clear();
        applyMode();
        if (lastSnap) renderSingle(lastSnap);
      }));
      el.querySelectorAll("#seg-gen button").forEach((b) => b.addEventListener("click", () => {
        genMode = b.dataset.val; localStorage.setItem("codey-gen", genMode);
        if (lastSnap) renderSingle(lastSnap);
      }));
    }

    // The generated why/how panel for an open task. Only in single view, where currentId is the
    // session these ids belong to.
    function explainBlock(scope, id) {
      if (view !== "single") return "";
      const key = ekey(scope, id);
      const cached = explCache.get(key);
      if (cached) return `<div class="expla"><div class="et">&#9670; Why &amp; how <span class="edepth">${esc(curDepth())}</span></div><div class="etext">${esc(cached)}</div></div>`;
      if (explLoading.has(key)) return `<div class="genwrap"><span class="gening"><span class="spin"></span>Explaining at ${esc(curDepth())} depth…</span></div>`;
      if (budgetPaused) return `<div class="gpaused">Budget reached, so Codey paused explaining. Raise it with <b>/codey:budget &lt;n&gt;</b> in your terminal, then try again.</div>`;
      return `<div class="genwrap"><button class="genbtn" type="button" data-gen-scope="${scope}" data-gen-id="${esc(id)}"><span class="ic">&#9670;</span> Explain why &amp; how</button>`
        + `<div class="genhint">Generates a ${esc(curDepth())} explanation. Uses your Codey tokens.</div></div>`;
    }

    // The closing recap card for a prompt group.
    function summaryBlock(g) {
      if (view !== "single") return "";
      const key = ekey("summary", g.id);
      const cached = explCache.get(key);
      if (cached) return `<div class="recap"><div class="rt"><span class="ic">&#9670;</span> What Claude got done</div><div class="rx">${esc(cached)}</div></div>`;
      if (explLoading.has(key)) return `<div class="recap"><span class="gening"><span class="spin"></span>Summarizing this prompt…</span></div>`;
      if (g.live) return `<div class="recap"><span class="pend">A recap appears here once Claude finishes this prompt.</span></div>`;
      if (budgetPaused) return `<div class="recap"><span class="pend warn">Budget reached. Raise it with /codey:budget, then summarize.</span></div>`;
      return `<div class="recap"><button class="genbtn" type="button" data-gen-scope="summary" data-gen-id="${esc(g.id)}"><span class="ic">&#10022;</span> Summarize this prompt</button>`
        + `<div class="genhint">Generates a ${esc(curDepth())} recap. Uses your Codey tokens.</div></div>`;
    }

    // ---- Live NOW strip + Follow Live ----
    let followLive = true;   // when live, keep the newest activity in view
    let nowState = null;     // last /now payload, for re-rendering the strip on toggle

    function renderNow(n) {
      const strip = document.getElementById("nowstrip");
      if (!strip) return;
      if (!n || !n.live || view !== "single") { strip.hidden = true; return; }
      strip.hidden = false;
      // Name the exact step: the tool tag plus its literal target (the real command/file), so
      // the strip says "Bash mkdir -p out && ..." not a vague "running a few shell commands".
      const tool = n.action ? `<span class="ntool">${esc(n.action.tool)}</span>` : "";
      const act = n.action
        ? `${tool}<span class="nact">${esc(n.action.detail || n.action.label)}</span>`
        : n.thinking ? `<span class="nact think">Thinking through the prompt</span>` : `<span class="nact">Working</span>`;
      const timer = n.since ? `<span class="ntime timer" data-since="${n.since}">${fmtDur(Date.now() - n.since)}</span>` : "";
      const follow = `<button class="follow${followLive ? " on" : ""}" id="follow-toggle" type="button">`
        + `<span class="fd"></span>${followLive ? "Following" : "Follow live"}</button>`;
      const trail = (n.steps && n.steps.length)
        ? `<div class="ntrail"><span class="lab">just did</span>`
          + n.steps.map((s) => `<span class="stp"><span class="k${s.status === "fail" ? " f" : ""}">`
            + `${s.status === "fail" ? "&#10007;" : "&#10003;"}</span> ${esc(s.label)}</span>`).join("")
          + `</div>`
        : "";
      strip.innerHTML = `<div class="nowtop"><span class="neye"><span class="ndot"></span>Live</span>${act}${timer}${follow}</div>${trail}`;
      document.getElementById("follow-toggle").addEventListener("click", () => setFollow(!followLive));
    }

    function setFollow(on) {
      followLive = on;
      renderNow(nowState);
      // Reflect the followed anchor right away without a full re-render.
      document.querySelectorAll(".grp.live").forEach((el) => el.classList.toggle("following", on));
      if (on) scrollToLive();
    }

    // Keep the newest activity in view, but only nudge when new content has pushed it off the
    // bottom, so a user reading at the end is not yanked every second.
    function scrollToLive() {
      if (!followLive) return;
      const fromBottom = document.body.scrollHeight - (window.scrollY + window.innerHeight);
      if (fromBottom > 40) window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    // A deliberate scroll up means "let me read"; pause following until the user opts back in.
    window.addEventListener("wheel", (e) => { if (e.deltaY < 0 && followLive) setFollow(false); }, { passive: true });

    async function tickNow() {
      if (view !== "single" || !currentId) { renderNow(null); return; }
      try {
        nowState = await (await fetch("/api/session/" + encodeURIComponent(currentId) + "/now")).json();
        renderNow(nowState);
        if (nowState.live && followLive) scrollToLive();
      } catch { /* keep the last strip on a transient error */ }
    }

    // ---- Intervention (Plan 3), preserved ----
    const FALLBACK = {
      nudge: { label: "Nudge it to move on", do: "If Claude keeps repeating it, press Esc to interrupt, then paste this so it skips the stuck step:",
        type: "You're looping on {tool}. Stop retrying that step and move on to the rest of the task." },
      different: { label: "Try a different approach", do: "If Claude keeps hitting the same error, press Esc, then paste this to push it toward a new method:",
        type: "{tool} keeps failing the same way. Stop and try a clearly different approach. If you know why it's failing, fix that cause first." },
      stop: { label: "Stop & ask me", do: "To take over right now, press Esc, then tell Claude what you want. You can start with:",
        type: "Stop what you're doing and wait. I want to take over and tell you what to do next." },
    };
    function stuckPhrase(w) {
      if (w.kind === "repeat_error") return `hit the same error ${w.count} times`;
      if (w.kind === "hang") return "been stuck on this step for a while";
      return `tried the same step ${w.count} times`;
    }
    function confirmedHtml(action, tool) {
      const f = FALLBACK[action];
      const typed = f.type.replace("{tool}", tool);
      return `<div class="intervene confirmed" data-tool="${esc(tool)}" data-action="${esc(action)}"><div class="intervene-after">`
        + `<div class="sent">&#10003; Sent &ldquo;${esc(f.label)}.&rdquo; It lands on Claude's next <span class="mono">${esc(tool)}</span> call.</div>`
        + `<div class="do">${esc(f.do)}</div>`
        + `<div class="copy"><code>${esc(typed)}</code><button class="copybtn" type="button">Copy</button></div></div></div>`;
    }
    function interventionBar(warning, chunkId) {
      const tool = warning.tool;
      const action = confirmed.get(chunkId);
      if (action) return confirmedHtml(action, tool);
      return `<div class="intervene" data-tool="${esc(tool)}" data-chunk="${esc(chunkId)}">`
        + `<div class="intervene-head"><span class="ico">&#9888;</span> Claude has ${esc(stuckPhrase(warning))}. Want to step in?</div>`
        + `<div class="intervene-btns">`
        + `<button class="ibtn primary" type="button" data-action="nudge">Nudge it to move on</button>`
        + `<button class="ibtn" type="button" data-action="different">Try a different approach</button>`
        + `<button class="ibtn ghost" type="button" data-action="stop">Stop &amp; ask me</button></div>`
        + `<div class="intervene-note">Sends Claude a note on its next step. Takes effect within a second or two; doesn't cancel your message.</div></div>`;
    }
    function warningPill(ws) {
      const rep = ws.find((w) => w.kind === "repeat_error");
      if (rep) return `<span class="pill amber">&#9888; same error &times;${rep.count}</span>`;
      const loop = ws.find((w) => w.kind === "loop");
      if (loop) return `<span class="pill amber">&#9888; same step &times;${loop.count}</span>`;
      return "";
    }

    // A card is open when the user opened it, or when it is the running task we auto-open to show
    // the current step (unless the user has explicitly collapsed that one).
    function isCardOpen(id) {
      if (open.has(id)) return true;
      return id === liveOpenId && !closedByUser.has(id);
    }

    // The step Claude is on inside the running task: the latest line with no result yet, or just
    // the latest line if everything so far has finished.
    function currentLineIndex(lines) {
      for (let i = lines.length - 1; i >= 0; i--) {
        if (lines[i].status !== "ok" && lines[i].status !== "fail") return i;
      }
      return lines.length - 1;
    }

    // ---- Receipt ----
    function actionCount(receipt) { return receipt.workLines.filter((l) => l.status !== "none").length; }

    // The per-action why/how line: cached text, a spinner, a budget notice, or the button.
    function actionWhy(c, idx) {
      if (view !== "single") return "";
      const id = c.id + "#" + idx;
      const key = ekey("action", id);
      const cached = explCache.get(key);
      if (cached) return `<div class="ld"><span class="lk">why &amp; how</span><span class="lv gen">${esc(cached)}</span></div>`;
      if (explLoading.has(key)) return `<div class="ld"><span class="lk">why &amp; how</span><span class="lv"><span class="gening"><span class="spin"></span>Explaining…</span></span></div>`;
      if (budgetPaused) return `<div class="ld"><span class="lk">why &amp; how</span><span class="lv" style="color:var(--amber)">Budget reached. Raise it with /codey:budget.</span></div>`;
      return `<div class="ld"><span class="lk"></span><span class="lv"><button class="whybtn" type="button" data-gen-scope="action" data-gen-id="${esc(id)}">Explain this step</button></span></div>`;
    }

    function lineDetail(c, l, idx) {
      const parts = [];
      if (l.thoughtFirst) parts.push(`<div class="ld"><span class="lk">first</span><span class="lv">Claude paused to think before this step.</span></div>`);
      if (l.ts) parts.push(`<div class="ld"><span class="lk">at</span><span class="lv">${fmtClockSec(l.ts)}</span></div>`);
      if (l.raw) parts.push(`<div class="ld"><span class="lk">ran</span><code>${esc(l.raw)}</code></div>`);
      if (l.why) parts.push(`<div class="ld"><span class="lk">Claude's note</span><span class="lv">${esc(l.why)}</span></div>`);
      if (l.status === "fail" && l.errorText) parts.push(`<div class="ld err"><span class="lk">error</span><code>${esc(l.errorText)}</code></div>`);
      parts.push(actionWhy(c, idx));
      return `<div class="ldetail">${parts.join("")}</div>`;
    }

    function workLineHtml(c, l, idx, isCur) {
      const think = l.tool === "thinking";
      const sw = l.status === "fail" ? "sw fail" : think ? "sw think" : "sw";
      const tag = think ? `<span class="tag think">thinking</span>` : `<span class="tag tool">${esc(l.tool)}</span>`;
      // The running step shows a live pip instead of a status mark.
      const st = isCur ? '<span class="curpip" title="running now"></span>'
        : l.status === "fail" ? '<span class="st fail">fail</span>'
        : l.status === "ok" ? '<span class="st ok">&#10003;</span>' : '<span class="st">&middot;</span>';
      const key = c.id + ":" + idx;
      const lo = lineOpen.has(key);
      // In single view every line expands, since even a bare step offers an "explain this step" button.
      const canExpand = view === "single" || !!(l.raw || l.why || l.ts || (l.status === "fail" && l.errorText));
      const chev = canExpand ? `<span class="lchev">${lo ? "&#9662;" : "&#9656;"}</span>` : `<span class="lchev sp"></span>`;
      const fail = l.status === "fail" && l.failSummary
        ? `<div class="failnote">${esc(l.failSummary)}${l.resolved ? ' <span class="note">&middot; recovered on the next try</span>' : ""}</div>` : "";
      return `<div class="rline${canExpand ? " can" : ""}${lo ? " lo" : ""}${isCur ? " cur" : ""}" data-line="${esc(key)}">`
        + `${chev}<span class="${sw}"></span><span class="lbl">${esc(l.label)}</span>${tag}<span class="num">${fmt(l.tokens)}</span>${st}</div>`
        + fail + (lo ? lineDetail(c, l, idx) : "");
    }

    // The shared activity behind a work line, used to spot a run of the same kind of step. We key
    // on the tool, so consecutive steps of the same kind fold even when their targets differ
    // (three reads of different files become one "Read 3 files" dropdown). A lone "Thought about
    // what to do next." row keys to null and never merges.
    function activityKey(l) {
      if (l.tool === "thinking") return null;
      return (l.tool || "").toLowerCase().trim();
    }

    // Fold consecutive lines that share an activity key into a burst, but only when there are
    // enough of them to be worth hiding (3+). Shorter runs stay as plain rows. Indices are kept
    // so each child still maps to its real work line for "explain this step".
    function groupBursts(lines) {
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const key = activityKey(lines[i]);
        let j = i;
        if (key !== null) while (j + 1 < lines.length && activityKey(lines[j + 1]) === key) j++;
        if (key !== null && j - i + 1 >= 3) {
          const items = [];
          for (let k = i; k <= j; k++) items.push({ l: lines[k], idx: k });
          out.push({ burst: true, start: i, items });
        } else {
          for (let k = i; k <= j; k++) out.push({ burst: false, l: lines[k], idx: k });
        }
        i = j + 1;
      }
      return out;
    }

    // A human summary for a folded run of same-tool steps, e.g. "Read 3 files", "Ran 3 commands".
    function burstSummary(tool, n) {
      const m = { Read: "Read " + n + " files", Edit: "Edited " + n + " files", Write: "Wrote " + n + " files",
        Bash: "Ran " + n + " commands", Grep: "Ran " + n + " searches", Glob: "Ran " + n + " searches" };
      return m[tool] || (n + " " + tool + " steps");
    }

    // One collapsed burst: a parent row that summarizes the run, expanding to the real child rows.
    function burstHtml(c, g, curIdx) {
      const key = c.id + "|b" + g.start;
      const hasCur = g.items.some((it) => it.idx === curIdx);
      const childOpen = g.items.some((it) => lineOpen.has(c.id + ":" + it.idx));
      const isOpen = burstOpen.has(key) || hasCur || childOpen;
      const head = g.items[0].l;
      const think = head.tool === "thinking";
      const anyFail = g.items.some((it) => it.l.status === "fail");
      const tokens = g.items.reduce((s, it) => s + (it.l.tokens || 0), 0);
      const sw = anyFail ? "sw fail" : think ? "sw think" : "sw";
      const chev = `<span class="lchev">${isOpen ? "&#9662;" : "&#9656;"}</span>`;
      const st = anyFail ? '<span class="st fail">fail</span>' : '<span class="st ok">&#10003;</span>';
      const children = isOpen
        ? `<div class="bchildren">${g.items.map((it) => workLineHtml(c, it.l, it.idx, it.idx === curIdx)).join("")}</div>` : "";
      return `<div class="rline brow${isOpen ? " lo" : ""}" data-burst="${esc(key)}">`
        + `${chev}<span class="${sw}"></span><span class="lbl">${esc(burstSummary(head.tool, g.items.length))}</span>`
        + `<span class="tag steps">${g.items.length} steps</span><span class="num">${fmt(tokens)}</span>${st}</div>`
        + children;
    }

    function receiptHtml(c, liveTask) {
      const r = c.receipt;
      const collapsed = workCollapsed.has(c.id);
      const wchev = collapsed ? "&#9656;" : "&#9662;";
      const curIdx = liveTask ? currentLineIndex(r.workLines) : -1;
      const work = collapsed ? "" : groupBursts(r.workLines)
        .map((g) => g.burst ? burstHtml(c, g, curIdx) : workLineHtml(c, g.l, g.idx, g.idx === curIdx)).join("");
      return `<div class="rcpt">`
        + `<div class="rhead js-work" role="button" tabindex="0" aria-expanded="${!collapsed}" data-id="${c.id}">`
        + `<span class="x">${wchev}</span><span class="ttl">Work Claude did</span><span class="colh">tokens</span><span class="tot">${fmt(c.workTotal)}</span></div>`
        + work
        + `</div>`;
    }

    // A task is still open (running) when its end is past the last recorded activity; in a
    // live session that one ticks, otherwise we show how long it took.
    // Returns the bare duration string (no "took" prefix) for the inline .rmeta slot.
    function durLabel(c, snap) {
      const openEnd = c.endTs > snap.lastActivityAt;
      if (openEnd && snap.live) return `<span class="timer" data-since="${c.startTs}">${fmtDur(Date.now() - c.startTs)}</span>`;
      const end = openEnd ? snap.lastActivityAt : c.endTs;
      return c.startTs ? fmtDur(end - c.startTs) : "";
    }

    function cardHtml(c, barWarning, snap) {
      const isOpen = isCardOpen(c.id);
      const liveTask = snap.live && c.id === liveOpenId;
      // class list: task is the base; open/live add state. warn is a semantic hook only - it
      // carries no structural CSS; the warning shows via the amber pill on the name.
      const cls = "task"
        + (isOpen ? " open" : "")
        + (liveTask ? " live" : "")
        + (c.warnings.length ? " warn" : "");
      // bare duration, no "took" prefix - the rmeta slot is compact
      const dur = durLabel(c, snap);
      const durCls = liveTask ? "rmeta running" : "rmeta";
      const liveBadge = liveTask ? `<span class="livetag">Live</span>` : "";
      const body = isOpen
        ? `<div class="tbody">`
          + (c.narration ? `<div class="tlead">${esc(c.narration)}</div>` : "")
          + explainBlock("task", c.id)
          + receiptHtml(c, liveTask)
          + `</div>`
        : "";
      return `<div class="${cls} js-toggle" data-id="${c.id}" role="button" tabindex="0" aria-expanded="${isOpen}">`
        + `<span class="nm">${esc(c.name)} ${warningPill(c.warnings)}</span>`
        + liveBadge
        + `<span class="${durCls}">${dur}</span>`
        + `<span class="rtok">${fmt(c.workTotal)}</span>`
        + `<span class="go">&#9656;</span>`
        + body
        + `</div>`
        + (barWarning ? interventionBar(barWarning, c.id) : "");
    }

    function groupHtml(g, snap, barFor) {
      const cards = g.chunks.map((c) => cardHtml(c, barFor(c), snap)).join("")
        || `<div class="grpnote">${g.live ? "Working on it…" : "Answered directly, no tools used."}</div>`;
      // Eyebrow: live gets the pulsing dot, cancelled gets a quiet note, otherwise "You asked".
      const eyebrow = g.live
        ? `<div class="geye live"><span class="geye-dot"></span>Working now</div>`
        : g.cancelled
        ? `<div class="geye">You asked &middot; cancelled</div>`
        : `<div class="geye">You asked</div>`;
      // Meta one-liner: clock, duration, tokens, task count with dot separators.
      const clock = fmtClock(g.startTs);
      const dur = g.live ? liveTimer(g.startTs) : `<b>${fmtDur(g.durationMs || 0)}</b>`;
      const promptDur = g.live ? `running ${dur}` : `took ${dur}`;
      const metaLine = `<div class="pmeta">${clock}<span class="s">&bull;</span>${promptDur}<span class="s">&bull;</span><b>${fmt(g.workTotal)}</b> tok<span class="s">&bull;</span>${g.taskCount} task${g.taskCount === 1 ? "" : "s"}</div>`;
      // Heading echo: first sentence of cached summary, for skimming a completed prompt.
      const sumKey = ekey("summary", g.id);
      const sum = explCache.get(sumKey);
      const echo = (!g.live && sum && view === "single") ? `<div class="gecho">${esc(firstSentence(sum))}</div>` : "";
      const following = g.live && followLive ? " following" : "";
      // When the user pressed Esc mid-turn, note it after the cards.
      const cancelNote = g.cancelled ? `<div class="grpcancel">&#9209; User cancelled Claude mid-prompt</div>` : "";
      const pmarkCls = "pmark" + (g.live ? " live" : "");
      return `<section class="grp${g.live ? " live" : ""}${g.cancelled ? " cancelled" : ""}${following}">`
        + `<div class="${pmarkCls}">${eyebrow}<div class="gtext">${esc(g.prompt)}</div>${metaLine}${echo}</div>`
        + `<div class="nodes">${cards}${cancelNote}${summaryBlock(g)}</div>`
        + `</section>`;
    }

    // Walks all receipt work lines and groups tokens into honest categories.
    // Returns { total, rows: [{label, tokens, pct}] } sorted by tokens descending.
    function tokenBreakdown(snap) {
      const buckets = { Reasoning: 0, "File work": 0, Searches: 0, Commands: 0, Other: 0 };
      for (const c of (snap.chunks || [])) {
        for (const line of (c.receipt && c.receipt.workLines || [])) {
          const t = line.tool || "";
          const tok = line.tokens || 0;
          if (t === "thinking") buckets.Reasoning += tok;
          else if (["Read", "Write", "Edit", "MultiEdit"].includes(t)) buckets["File work"] += tok;
          else if (["Grep", "Glob"].includes(t)) buckets.Searches += tok;
          else if (["Bash", "PowerShell"].includes(t)) buckets.Commands += tok;
          else buckets.Other += tok;
        }
      }
      const total = Object.values(buckets).reduce((a, b) => a + b, 0);
      const rows = Object.entries(buckets)
        .filter(([, v]) => v > 0)
        .sort(([, a], [, b]) => b - a)
        .map(([label, tokens]) => ({ label, tokens, pct: Math.round(tokens / total * 100) }));
      return { total, rows };
    }

    function renderSummary(snap) {
      // Derive the live task here so we don't depend on liveOpenId being set before this runs.
      const liveGroup = (snap.groups || []).find(g => g.live);
      const liveChunk = liveGroup && liveGroup.chunks.length
        ? liveGroup.chunks[liveGroup.chunks.length - 1] : null;

      const total = snap.taskCount || 0;
      const glyph = statsCollapsed ? "&laquo;" : "&raquo;";
      const expanded = !statsCollapsed;

      // --- Card 1: Right now ---
      // The green nowcard border is live-only: idle and warn states stay neutral (no green).
      const nowLive = snap.live && liveChunk && !snap.activeWarning;
      let nowCardInner;
      if (snap.activeWarning) {
        // Warn state: amber dot + stuck phrase
        nowCardInner =
          `<div class="stat" style="color:var(--warn)"><span class="d" style="background:var(--warn);box-shadow:0 0 6px rgba(224,162,58,.5);animation:none"></span>Needs a look</div>`
          + `<div class="doing" style="color:var(--body);font-weight:400">${esc(stuckPhrase(snap.activeWarning))}</div>`;
      } else if (snap.live && liveChunk) {
        const done = Math.max(0, total - 1);
        const pct = total ? Math.round(done / total * 100) : 0;
        nowCardInner =
          `<div class="stat"><span class="d"></span>Working</div>`
          + `<div class="doing">${esc(liveChunk.name)}</div>`
          + `<div class="el">on this task ${liveTimer(liveChunk.startTs)} &bull; session ${snap.startedAt ? liveTimer(snap.startedAt) : "running"}</div>`
          + `<div class="prog"><div class="pl">Session progress <b class="num">${done} / ${total} tasks</b></div>`
          + `<div class="bar"><i style="width:${pct}%"></i></div></div>`;
      } else {
        // Idle: calm non-green state, full progress bar
        const pct = total ? 100 : 0;
        const lastActive = snap.lastActivityAt
          ? "last active " + esc(ago(snap.lastActivityAt)) : "not running";
        nowCardInner =
          `<div class="doing">Idle</div>`
          + `<div class="el">${lastActive}</div>`
          + `<div class="prog"><div class="pl">Session progress <b class="num">${total} / ${total} tasks</b></div>`
          + `<div class="bar"><i style="width:${pct}%"></i></div></div>`;
      }

      // --- Card 2: This session ---
      const sessDur = snap.live
        ? (snap.startedAt ? `${liveTimer(snap.startedAt)} <span class="dim">&bull; running</span>` : `<span class="dim">running</span>`)
        : fmtDur((snap.lastActivityAt || snap.startedAt || 0) - (snap.startedAt || 0));
      const prompts = (snap.groups || []).length;
      const bd = tokenBreakdown(snap);
      const brkRows = bd.rows.length
        ? bd.rows.map(r =>
            `<div class="brkrow"><div class="top"><span class="bn">${esc(r.label)}</span>`
            + `<span class="bv num">${fmt(r.tokens)} <span class="pct">${r.pct}%</span></span></div>`
            + `<div class="tr"><i style="width:${r.pct}%"></i></div></div>`).join("")
        : `<div style="font-size:11px;color:var(--muted)">No token activity yet.</div>`;

      document.getElementById("summary").innerHTML =
        `<div class="sidehd"><span class="t">Session stats</span>`
        + `<button class="tog" id="stats-tog" type="button" aria-label="${expanded ? "Collapse" : "Expand"} stats" aria-expanded="${expanded}">${glyph}</button></div>`
        + `<div class="statsbody">`
        + `<div class="scard${nowLive ? " nowcard" : ""}" aria-live="polite"><div class="k">Right now</div>${nowCardInner}</div>`
        + `<div class="scard"><div class="k">This session</div>`
        + `<div class="pair"><span class="l">Duration</span><span class="v num">${sessDur}</span></div>`
        + `<div class="pair"><span class="l">Prompts</span><span class="v num">${prompts}</span></div>`
        + `<div class="pair"><span class="l">Priciest task</span><span class="v">${esc(snap.priciestTaskName || "none yet")}</span></div>`
        + `<div style="height:13px"></div>`
        + `<div class="k">Tokens &middot; ${fmt(bd.total)}</div>`
        + `<div class="brk">${brkRows}</div>`
        + `</div></div>`;

      // Apply collapse class and wire the toggle (survives per-tick re-render via JS state var).
      const aside = document.getElementById("summary");
      aside.classList.toggle("collapsed", statsCollapsed);
      const tog = document.getElementById("stats-tog");
      if (tog) {
        tog.onclick = () => {
          statsCollapsed = !statsCollapsed;
          localStorage.setItem("codey-stats-collapsed", statsCollapsed ? "1" : "0");
          aside.classList.toggle("collapsed", statsCollapsed);
          tog.innerHTML = statsCollapsed ? "&laquo;" : "&raquo;";
          tog.setAttribute("aria-expanded", String(!statsCollapsed));
          tog.setAttribute("aria-label", (statsCollapsed ? "Expand" : "Collapse") + " stats");
