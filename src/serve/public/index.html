        };
      }
    }

    function renderHeader(snap) {
      document.getElementById("sname").textContent = snap.sessionName;
      const el = document.getElementById("sproj");
      el.innerHTML = `<span class="cdot${snap.live ? " run" : ""}" style="background:${esc(snap.color || "#5fb0ff")}"></span>`
        + (snap.project ? `<span class="ptag">${esc(snap.project)}</span>` : "");
    }

    function sessRowHtml(s) {
      const active = s.id === currentId ? " active" : "";
      const proj = s.project ? ` &middot; ${esc(s.project)}` : "";
      if (s.id === renamingId) {
        return `<div class="sessrename" data-id="${esc(s.id)}">`
          + `<input class="rename-in" type="text" value="${esc(s.name)}" aria-label="New name" /></div>`;
      }
      return `<button class="sess${active}" data-id="${esc(s.id)}" type="button">`
        + `<span class="sname"><span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>${esc(s.name)}</span>`
        + `<span class="smeta">${ago(s.mtime)} &middot; ${s.taskCount} task${s.taskCount === 1 ? "" : "s"}${proj}</span>`
        + `</button>`;
    }

    // True when a session's time falls inside the From/To date filter (either bound may be open).
    function inDateRange(s) {
      const from = dateFrom ? new Date(dateFrom + "T00:00:00").getTime() : null;
      const to = dateTo ? new Date(dateTo + "T23:59:59.999").getTime() : null;
      if (from != null && s.mtime < from) return false;
      if (to != null && s.mtime > to) return false;
      return true;
    }

    function updateDateSummary() {
      const sum = document.getElementById("datesummary");
      if (!sum) return;
      const active = dateFrom || dateTo;
      sum.classList.toggle("on", !!active);
      sum.textContent = active ? `Dates: ${dateFrom || "any"} to ${dateTo || "any"}` : "Filter by date";
    }

    // Build the rail's static shell once: the search box and date filter must be stable elements
    // so typing in them is never interrupted by a list refresh. The list itself lives in #raillist
    // and is the only part that re-renders on each poll.
    function ensureRailShell() {
      if (railWired) return;
      document.getElementById("rail").innerHTML =
        `<p class="rh">Sessions</p>`
        + `<input class="railsearch" id="railsearch" type="search" placeholder="Search terminals" autocomplete="off" />`
        + `<details class="datefilter" id="datefilter"><summary id="datesummary">Filter by date</summary>`
        + `<div class="daterow">`
        + `<label class="dlab">From<input type="date" id="date-from" class="dinput" /></label>`
        + `<label class="dlab">To<input type="date" id="date-to" class="dinput" /></label></div>`
        + `<button class="dclear" id="date-clear" type="button">Clear dates</button></details>`
        + `<div id="raillist"></div>`;

      const search = document.getElementById("railsearch");
      search.value = railFilter;
      search.addEventListener("input", (e) => { railFilter = e.target.value; renderRailList(lastSessions); });

      const from = document.getElementById("date-from");
      const to = document.getElementById("date-to");
      from.value = dateFrom; to.value = dateTo;
      from.addEventListener("change", (e) => { dateFrom = e.target.value; updateDateSummary(); renderRailList(lastSessions); });
      to.addEventListener("change", (e) => { dateTo = e.target.value; updateDateSummary(); renderRailList(lastSessions); });
      document.getElementById("date-clear").addEventListener("click", () => {
        dateFrom = ""; dateTo = ""; from.value = ""; to.value = "";
        updateDateSummary(); renderRailList(lastSessions);
      });
      updateDateSummary();
      railWired = true;
    }

    function renderRail(sessions) {
      ensureRailShell();
      renderRailList(sessions);
    }

    // Re-render just the session list (never the inputs), grouped by day.
    function renderRailList(sessions) {
      const list = document.getElementById("raillist");
      if (!list) return;
      const q = railFilter.trim().toLowerCase();
      const shown = sessions.filter((s) =>
        (!q || (s.name + " " + (s.project || "")).toLowerCase().includes(q)) && inDateRange(s));
      // Group by day, preserving the most-recent-first order the server already sorted by.
      const days = [];
      const byDay = new Map();
      for (const s of shown) {
        const d = s.day || "Earlier";
        if (!byDay.has(d)) { byDay.set(d, []); days.push(d); }
        byDay.get(d).push(s);
      }
      const groups = days.map((d) => {
        const rows = byDay.get(d);
        return `<div class="dayhd">${esc(d)}<span class="dcount">${rows.length}</span></div>`
          + rows.map(sessRowHtml).join("");
      }).join("");
      const empty = (q || dateFrom || dateTo) ? "No terminals match." : "No terminals yet.";
      list.innerHTML = shown.length ? groups : `<p class="smeta" style="padding-left:3px">${empty}</p>`;

      list.querySelectorAll(".sess").forEach((el) => {
        el.addEventListener("click", () => {
          currentId = el.dataset.id; pinned = true; followLive = true;
          open.clear(); closedByUser.clear(); tickSingle(); tickNow();
        });
      });

      const input = list.querySelector(".rename-in");
      if (input) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        const commit = () => commitRename(renamingId, input.value);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          else if (e.key === "Escape") { e.preventDefault(); renamingId = null; renderRailList(lastSessions); }
        });
        input.addEventListener("blur", commit);
      }
    }

    function startRename(id) { renamingId = id; renderRailList(lastSessions); }

    async function commitRename(id, name) {
      if (!id) return;
      renamingId = null;
      try {
        await fetch("/api/session/" + encodeURIComponent(id) + "/name", {
          method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name }),
        });
      } catch { /* keep going; the rail will refetch on the next tick */ }
      tickSingle();
    }

    async function deleteSession(id) {
      const s = lastSessions.find((x) => x.id === id);
      if (!confirm("Delete " + (s ? s.name : "this terminal") + " from the timeline? This cannot be undone.")) return;
      try { await fetch("/api/session/" + encodeURIComponent(id), { method: "DELETE" }); } catch { /* refetch handles it */ }
      if (currentId === id) { currentId = null; pinned = false; }
      tickSingle();
    }

    function renderSingle(snap) {
      lastSnap = snap;
      liveNow = !!snap.live;
      if (depth === null) { depth = snap.seedDepth || "deep"; applyMode(); }
      if (genMode === null) genMode = snap.genAuto ? "auto" : "saver";
      seedEmbedded(snap);
      renderHeader(snap);
      renderControls(snap);
      renderSummary(snap);
      const chunks = snap.chunks || [];
      const groups = snap.groups || [];
      // The running task is the last task of the live prompt group, auto-opened below. Scoping to
      // the live group (not the last task overall) keeps a new prompt from lighting up the previous
      // prompt's trailing step: a fresh group has no tasks yet, so nothing reads as "running now".
      const liveGroup = groups.find((g) => g.live);
      const liveChunks = liveGroup ? liveGroup.chunks : (groups.length ? [] : chunks);
      liveOpenId = snap.live && liveChunks.length ? liveChunks[liveChunks.length - 1].id : null;
      const main = document.getElementById("main");
      if (!snap.activeWarning) confirmed.clear();
      const lastId = chunks.length ? chunks[chunks.length - 1].id : null;
      const barFor = (c) => (snap.live && snap.activeWarning && c.id === lastId ? snap.activeWarning : null);

      // Wrap in .feed for the continuous spine; empty state does not get the wrapper.
      main.innerHTML = groups.length
        ? '<div class="feed">' + groups.map((g) => groupHtml(g, snap, barFor)).join("") + "</div>"
        : (chunks.length
          ? '<div class="feed">' + chunks.map((c) => cardHtml(c, barFor(c), snap)).join("") + "</div>"
          : '<div class="empty">No activity recorded for this session yet.</div>');

      wireCards(main, () => renderSingle(snap));
      wireIntervention(main);
      wireGenerate(main);
      maybeAutoSummary(snap);
    }

    // Wire every "Explain"/"Why"/"Summarize" button to its generation request.
    function wireGenerate(scope) {
      scope.querySelectorAll("[data-gen-scope]").forEach((b) => b.addEventListener("click", (e) => {
        e.stopPropagation();
        generate(b.dataset.genScope, b.dataset.genId);
      }));
    }

    // In Auto, generate the recap for the single most-recently-finished prompt, once per depth.
    // Everything else (older summaries, all task and action explanations) stays click-to-generate.
    function maybeAutoSummary(snap) {
      if (genMode !== "auto" || budgetPaused) return;
      const completed = (snap.groups || []).filter((g) => !g.live);
      const target = completed[completed.length - 1];
      if (!target) return;
      const key = ekey("summary", target.id);
      if (explCache.has(key) || explLoading.has(key) || autoFired.has(key)) return;
      autoFired.add(key);
      setTimeout(() => generate("summary", target.id), 0);
    }

    // Shared expand/collapse wiring for task rows, used by both Single and Active Terminals.
    function wireCards(scope, rerender) {
      const wire = (sel, fn) => scope.querySelectorAll(sel).forEach((el) => {
        const run = () => { fn(el); rerender(); };
        el.addEventListener("click", (e) => { e.stopPropagation(); run(); });
        el.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); run(); } });
      });
      // .js-toggle is on the .task div itself; el.dataset.id holds the chunk id.
      wire(".js-toggle", (el) => {
        const id = el.dataset.id;
        if (!id) return;
        // Toggle against what is actually showing, so collapsing the auto-opened live task sticks.
        if (isCardOpen(id)) { open.delete(id); closedByUser.add(id); }
        else { open.add(id); closedByUser.delete(id); }
      });
      wire(".js-work", (el) => { const id = el.dataset.id; workCollapsed.has(id) ? workCollapsed.delete(id) : workCollapsed.add(id); });
      wire(".rline.can", (el) => { const k = el.dataset.line; lineOpen.has(k) ? lineOpen.delete(k) : lineOpen.add(k); });
      wire(".rline.brow", (el) => { const k = el.dataset.burst; burstOpen.has(k) ? burstOpen.delete(k) : burstOpen.add(k); });
    }

    function wireIntervention(scope) {
      scope.querySelectorAll(".intervene").forEach((barEl) => {
        const tool = barEl.dataset.tool;
        barEl.querySelectorAll(".ibtn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            barEl.querySelectorAll(".ibtn").forEach((b) => (b.disabled = true));
            try {
              await fetch("/api/session/" + encodeURIComponent(currentId) + "/intervene", {
                method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action }),
              });
            } catch { /* the Esc path is the real stop */ }
            confirmed.set(barEl.dataset.chunk, action);
            tickSingle();
          });
        });
        const copyBtn = barEl.querySelector(".copybtn");
        if (copyBtn) copyBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          navigator.clipboard?.writeText(FALLBACK[barEl.dataset.action].type.replace("{tool}", tool));
          copyBtn.textContent = "Copied";
        });
      });
    }

    // ---- polling ----
    async function tickSingle() {
      let sessions = [];
      try { sessions = await (await fetch("/api/sessions")).json(); } catch { sessions = []; }
      if (view !== "single") return; // a view switch landed while this fetch was in flight
      lastSessions = sessions;
      if (!pinned && sessions[0]) currentId = sessions[0].id;
      const anyRunning = sessions.some((s) => s.running);
      updateLiveBadge(sessions.filter((s) => s.running).length);
      // Don't redraw the rail mid-rename or the input loses focus and the typed text.
      if (!renamingId) renderRail(sessions);
      // Only offer "Jump to live" when there is something live to jump to.
      document.getElementById("jumplive").hidden = !(pinned && anyRunning);
      if (!currentId) { document.getElementById("main").innerHTML = '<div class="empty">No sessions found.</div>'; return; }
      try {
        const snap = await (await fetch("/api/session/" + encodeURIComponent(currentId))).json();
        if (view !== "single") return;
        renderSingle(snap);
      } catch { /* keep last view on a transient error */ }
    }

    document.getElementById("jumplive").addEventListener("click", () => {
      pinned = false; document.getElementById("jumplive").hidden = true; tick();
    });
    document.getElementById("tb-single").addEventListener("click", () => setView("single"));
    document.getElementById("tb-split").addEventListener("click", () => setView("split"));
    document.getElementById("rename-current").addEventListener("click", () => {
      if (currentId) startRename(currentId);
    });
    document.getElementById("delete-current").addEventListener("click", () => {
      if (currentId) deleteSession(currentId);
    });
    function setView(v) {
      view = v;
      document.body.classList.toggle("split", v === "split");
      document.getElementById("tb-single").classList.toggle("on", v === "single");
      document.getElementById("tb-split").classList.toggle("on", v === "split");
      document.getElementById("rail").style.display = v === "split" ? "none" : "";
      document.getElementById("summary").style.display = v === "split" ? "none" : "";
      document.getElementById("jumplive").hidden = true;
      renderNow(view === "single" ? nowState : null);
      // Paint the target view from cache immediately so the previous view's content never lingers
      // or flashes while the fresh data is in flight.
      const main = document.getElementById("main");
      if (v === "split") {
        if (lastLive) renderSplit(lastLive); else main.innerHTML = '<div class="empty">Loading…</div>';
      } else {
        if (lastSnap) renderSingle(lastSnap); else main.innerHTML = '<div class="empty">Loading…</div>';
      }
      tick();
    }

    function updateLiveBadge(n) {
      document.getElementById("livecount").textContent = n;
      const wrap = document.getElementById("livewrap");
      // Always visible: when 0 it shows a calm "idle" state so a still badge never looks frozen.
      wrap.classList.toggle("idle", n === 0);
      document.getElementById("livelabel").textContent = n === 0 ? "idle" : "live";
    }

    // ---- Active Terminals (multi-session) ----
    // Two full-size terminals side by side per page; the pager walks the rest. Bounded so a
    // machine with many open terminals does not re-render dozens of full receipts every tick.
    const SPLIT_PER_PAGE = 2;
    let lastLive = null; // keep the last payload so pager clicks re-render without a refetch

    async function dismissTerminal(id) {
      try { await fetch("/api/session/" + encodeURIComponent(id) + "/dismiss", { method: "POST" }); } catch { /* refetch handles it */ }
      tickSplit();
    }
    async function restoreTerminal(id) {
      try { await fetch("/api/session/" + encodeURIComponent(id) + "/restore", { method: "POST" }); } catch { /* refetch handles it */ }
      tickSplit();
    }

    // The "Hidden (N)" tray: dismissed terminals offered back for restore. Empty -> nothing shown.
    function hiddenTrayHtml(hidden) {
      if (!hidden || hidden.length === 0) return "";
      const chips = hidden.map((h) =>
        `<span class="hidchip"><span class="hcdot" style="background:${esc(h.color || "#5fb0ff")}"></span>${esc(h.name)}`
        + `<button type="button" data-restore="${esc(h.sessionId)}">Restore</button></span>`).join("");
      return `<div class="hiddentray"><span class="htlab">Hidden (${hidden.length}):</span>${chips}</div>`;
    }

    function paneHtml(s, isFirst) {
      // A pane is "live" (amber frame) whenever the terminal is running: mid-tool OR thinking.
      // A cancelled turn gets a quiet amber frame too, so an interrupted terminal reads as such.
      const cls = "pane" + (s.running ? " run" : "") + (s.cancelled && !s.running ? " cancelled" : "");
      const pill = s.thinking ? `<span class="badge think">&#9670; Thinking</span>`
        : isFirst && s.running ? `<span class="badge">&#10022; Just prompted</span>` : "";
      const proj = s.project ? `<span class="pproj">${esc(s.project)}</span>` : "";
      const dismissBtn = `<button class="pdismiss" type="button" data-dismiss="${esc(s.sessionId)}" title="Hide this terminal" aria-label="Hide this terminal">&times;</button>`;
      // Namespace each chunk id with the session so the same card index in two panes does not
      // share expand state. Render the full Single-view card so panes get the same receipts.
      const chunks = s.chunks.map((c) => ({ ...c, id: s.sessionId + "~" + c.id }));
      const lastFinite = chunks.reduce((m, c) => {
        const e = c.endTs < 1e15 ? c.endTs : c.startTs;
        return e > m ? e : m;
      }, 0) || Date.now();
      const pseudo = { live: s.running, lastActivityAt: lastFinite };
      const cards = chunks.map((c) => cardHtml(c, null, pseudo)).join("");
      // The body: thinking banner, the cards so far, and the live "running X now" line. When a
      // terminal has done no tool work, say so plainly instead of dimming it like it is broken.
      const think = s.thinking ? `<div class="pthink"><span class="pip"></span>Thinking through the prompt…</div>` : "";
      const runl = s.runningTool ? `<div class="prun"><span class="pip"></span>running ${esc(s.runningTool)} now</div>` : "";
      // Mirror the single view's end-of-turn note when the user pressed Esc mid-prompt.
      const cancelNote = s.cancelled ? `<div class="grpcancel">&#9209; User cancelled Claude mid-prompt</div>` : "";
      let body;
      if (chunks.length) body = `${think}${cards}${runl}${cancelNote}`;
      else if (s.thinking) body = think;
      else if (s.cancelled) body = cancelNote;
      else body = `<div class="pnote"><span class="pn1">Answered directly</span>No tools used for this prompt.</div>`;
      // Pinned prompt strip: what the user asked, like the single view's "You asked" heading. It
      // stays above the scrolling body so it never scrolls away while a busy pane fills up.
      const eyebrow = s.running
        ? `<span class="geyebrow glive"><span class="rdot"></span>You asked &middot; working now</span>`
        : s.cancelled ? `<span class="geyebrow gcancel">You asked &middot; cancelled</span>`
        : `<span class="geyebrow">You asked</span>`;
      const promptStrip = s.prompt
        ? `<div class="pprompt">${eyebrow}<div class="pptext">${esc(s.prompt)}</div></div>` : "";
      return `<div class="${cls}"><div class="phead"><span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>`
        + `<span class="pname">${esc(s.name)}</span>${proj}${pill}`
        + `<span class="pwork"><b>${fmt(s.workTotal)}</b> tokens</span>${dismissBtn}</div>`
        + `${promptStrip}<div class="pbody">${body}</div></div>`;
    }

    function renderSplit(live) {
      const sessions = live.sessions;
      liveNow = live.liveCount > 0;
      updateLiveBadge(live.liveCount);
      document.getElementById("sname").textContent = "Active terminals";
      const main = document.getElementById("main");
      const tray = hiddenTrayHtml(live.hidden);
      if (sessions.length === 0) {
        main.innerHTML = '<div class="splitwrap">' + tray
          + '<div class="empty">No terminals are open right now. Prompt Claude in any terminal to see it appear here.</div></div>';
        wireSplitControls(main);
        return;
      }
      const pages = Math.max(1, Math.ceil(sessions.length / SPLIT_PER_PAGE));
      if (!splitPinned) splitPage = 1;          // follow the front until the user pages
      splitPage = Math.min(Math.max(1, splitPage), pages);
      const start = (splitPage - 1) * SPLIT_PER_PAGE;
      const pageItems = sessions.slice(start, start + SPLIT_PER_PAGE);

      const stack = pageItems.map((s) => paneHtml(s, splitPage === 1 && s === sessions[0])).join("");
      const dots = Array.from({ length: pages }, (_, i) => `<span class="dot${i + 1 === splitPage ? " on" : ""}"></span>`).join("");
      const pager = pages > 1
        ? `<div class="pager"><button class="nav" id="pg-prev" type="button"${splitPage === 1 ? " disabled" : ""}>&#8249;</button>`
          + `<div class="dots">${dots}</div>`
          + `<button class="nav" id="pg-next" type="button"${splitPage === pages ? " disabled" : ""}>&#8250;</button>`
          + `<span class="prange">Page ${splitPage} of ${pages} &middot; most recent first</span></div>`
        : "";
      // Controls (pager + hidden tray) pinned above; the two panes fill the row below. A lone
      // pane on the last page spans the full width instead of leaving an empty column.
      const solo = pageItems.length === 1 ? " solo" : "";
      main.innerHTML = `<div class="splitwrap">${pager}${tray}<div class="tstack${solo}">${stack}</div></div>`;

      const prev = document.getElementById("pg-prev");
      const next = document.getElementById("pg-next");
      if (prev) prev.addEventListener("click", () => { splitPinned = true; splitPage--; renderSplit(lastLive); });
      if (next) next.addEventListener("click", () => { splitPinned = true; splitPage++; renderSplit(lastLive); });
      wireSplitControls(main);
      wireCards(main, () => renderSplit(lastLive));
    }

    // Wire the dismiss (X) buttons and the hidden-tray restore buttons.
    function wireSplitControls(main) {
      main.querySelectorAll("[data-dismiss]").forEach((el) =>
        el.addEventListener("click", (e) => { e.stopPropagation(); dismissTerminal(el.dataset.dismiss); }));
      main.querySelectorAll("[data-restore]").forEach((el) =>
        el.addEventListener("click", (e) => { e.stopPropagation(); restoreTerminal(el.dataset.restore); }));
    }

    function tick() { if (view === "single") return tickSingle(); return tickSplit(); }
    async function tickSplit() {
      try {
        const live = await (await fetch("/api/live")).json();
        if (view !== "split") return; // a view switch landed while this fetch was in flight
        lastLive = live;
        renderSplit(lastLive);
      } catch { /* keep the last view on a transient error */ }
    }

    // Tick live elapsed timers once a second between the 2s data polls, so running tasks,
    // groups and the session timer count up smoothly without hammering the server.
    setInterval(() => {
      document.querySelectorAll(".timer[data-since]").forEach((el) => {
        const since = Number(el.dataset.since);
        if (since > 0) el.textContent = fmtDur(Date.now() - since);
      });
    }, 1000);

    // Self-scheduling poll: 1s while something is live so the current step and receipts keep
    // pace with Claude, easing to 2.5s when idle to stay cheap. Re-scheduled after each tick so
    // a slow fetch never stacks requests.
    async function tickLoop() {
      try { await tick(); } catch { /* keep the loop alive on a transient error */ }
      setTimeout(tickLoop, liveNow ? 1000 : 2500);
    }
    tickLoop();
    // The NOW strip polls a cheap endpoint a bit under once a second so the current step and the
    // quick steps in its trail feel live, without fetching the full snapshot that often.
    tickNow();
    setInterval(tickNow, 600);
  </script>
</body>
</html>
