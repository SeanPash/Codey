<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codey timeline</title>
  <style>
    @font-face { font-family:'Inter'; font-weight:400; font-display:swap; src:url('/fonts/Inter-400.woff2') format('woff2'); }
    @font-face { font-family:'Inter'; font-weight:600; font-display:swap; src:url('/fonts/Inter-600.woff2') format('woff2'); }
    @font-face { font-family:'Inter'; font-weight:700; font-display:swap; src:url('/fonts/Inter-700.woff2') format('woff2'); }
    @font-face { font-family:'W95FA'; font-display:swap; src:url('/fonts/W95FA.woff') format('woff'); }

    :root {
      --bg:#0c0e12; --card:#14171f; --line:#232a36; --inset:#0b0e15;
      --sky:#5fb0ff; --sky-dim:#3d7fc4; --violet:#9b8cff; --coral:#f0654f; --green:#6cc08a; --amber:#e6a24e;
      --ink:#f1f4f9; --ink2:#cad1de; --body:#a9b1c0; --muted:#7a8392;
      --topbar:52px; --titlerow:50px; --head:102px;
    }
    body.split { --titlerow:0px; --head:52px; }
    * { box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--ink);
      margin:0; line-height:1.45; -webkit-font-smoothing:antialiased; letter-spacing:-0.005em; }
    .disp { font-family:'W95FA','Inter',sans-serif; letter-spacing:.02em; }
    .tok, .num, .big, .tot, .pwork b { font-variant-numeric:tabular-nums; }

    /* top bar */
    .topbar { display:flex; align-items:center; gap:12px; padding:13px 20px; border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#11141b,#0e1117); position:sticky; top:0; z-index:5; }
    .eyebrow { font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--sky); }
    .wm { font-size:17px; color:var(--ink); }
    .sproj { display:inline-flex; align-items:center; gap:7px; }
    .ptag { font-size:11px; color:var(--ink2); background:#0c0f16; border:1px solid #283246; border-radius:6px; padding:2px 8px; }
    .cdot { width:9px; height:9px; border-radius:50%; flex:none; display:inline-block; }
    .cdot.run { box-shadow:0 0 0 0 rgba(95,176,255,.5); animation:pp 1.8s infinite; }
    .livewrap { display:inline-flex; align-items:center; gap:9px; padding:5px 12px; border-radius:9px; border:1px solid #283246; background:#0c0f16; transition:border-color .3s, background .3s; }
    .eq { display:inline-flex; align-items:flex-end; gap:2px; height:13px; }
    .eq i { width:3px; background:var(--sky); border-radius:1px; animation:bounce 1s ease-in-out infinite; }
    .eq i:nth-child(1){animation-delay:0s} .eq i:nth-child(2){animation-delay:.2s} .eq i:nth-child(3){animation-delay:.4s} .eq i:nth-child(4){animation-delay:.15s}
    @keyframes bounce { 0%,100%{height:4px} 50%{height:13px} }
    .livewrap b { font-size:12px; font-weight:700; color:#bfe0ff; } .livewrap span { font-size:11px; color:var(--body); }
    /* idle: calm and obviously not-live, so a still "0" never reads as frozen */
    .livewrap.idle { border-color:#222a36; background:#0b0e14; }
    .livewrap.idle .eq i { animation:none; height:4px; background:#3a4454; }
    .livewrap.idle b { color:var(--muted); } .livewrap.idle span { color:var(--muted); }

    /* title row: the session name gets its own line so long names breathe */
    .titlerow { display:flex; align-items:center; gap:11px; padding:9px 20px; border-bottom:1px solid var(--line);
      background:#0d1016; position:sticky; top:var(--topbar); z-index:4; }
    body.split .titlerow { display:none; }
    .titlerow .stitle { font-size:20px; font-weight:400; color:var(--ink); margin:0; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .titlerow .renamebtn { flex:none; background:transparent; border:1px solid transparent; color:var(--muted);
      border-radius:7px; padding:3px 8px; font-size:13px; cursor:pointer; opacity:0; transition:opacity .15s, border-color .15s, color .15s; }
    .titlerow:hover .renamebtn { opacity:1; }
    .titlerow .renamebtn:hover { color:var(--sky); border-color:rgba(95,176,255,.3); }
    .titlerow .stitle-input { font:inherit; font-size:20px; background:var(--inset); border:1px solid var(--sky-dim);
      color:var(--ink); border-radius:7px; padding:3px 9px; min-width:280px; }
    .toggle { margin-left:auto; display:flex; background:#0c0f16; border:1px solid #283246; border-radius:8px; padding:2px; }
    .toggle button { font:inherit; font-size:12px; padding:5px 13px; border:none; background:transparent; color:var(--muted); border-radius:6px; cursor:pointer; }
    .toggle button.on { background:rgba(95,176,255,.14); color:#bfe0ff; box-shadow:inset 0 0 0 1px rgba(95,176,255,.3); }
    .jumplive { font:inherit; font-size:11px; color:var(--sky); background:transparent; border:1px solid rgba(95,176,255,.3); border-radius:7px; padding:5px 10px; cursor:pointer; }

    /* three-zone layout */
    .cols { display:flex; align-items:flex-start; min-height:calc(100vh - var(--head)); }
    .rail { width:232px; flex:none; border-right:1px solid var(--line); padding:12px 10px; position:sticky; top:var(--head); align-self:stretch; max-height:calc(100vh - var(--head)); overflow-y:auto; }
    .rh { font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:0 0 9px 3px; font-weight:600; }
    /* sessions search + day headers */
    .railsearch { width:100%; margin:0 0 10px; background:var(--inset); border:1px solid #283246; color:var(--ink);
      border-radius:8px; padding:7px 10px; font:inherit; font-size:12px; }
    .railsearch::placeholder { color:var(--muted); }
    .railsearch:focus { outline:none; border-color:var(--sky-dim); }
    .dayhd { font-size:8.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); font-weight:700;
      margin:11px 0 5px 4px; }
    .dayhd:first-of-type { margin-top:2px; }
    .sess { position:relative; padding:8px 10px; border-radius:8px; margin-bottom:4px; line-height:1.3; cursor:pointer; display:block; width:100%; text-align:left; border:none; background:transparent; color:var(--ink); font:inherit; }
    .sess:hover { background:#11141b; }
    /* row action buttons, revealed on hover */
    .sessacts { position:absolute; top:6px; right:6px; display:none; gap:3px; }
    .sess:hover .sessacts { display:flex; }
    .sessacts button { background:#10141d; border:1px solid #283246; color:var(--muted); border-radius:6px;
      width:22px; height:22px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
    .sessacts button:hover { color:var(--sky); border-color:rgba(95,176,255,.4); }
    .sessacts button.del:hover { color:var(--coral); border-color:rgba(240,101,79,.4); }
    .sessrename { width:100%; display:flex; gap:5px; align-items:center; padding:5px 6px; }
    .sessrename input { flex:1; min-width:0; background:var(--inset); border:1px solid var(--sky-dim); color:var(--ink);
      border-radius:6px; padding:5px 7px; font:inherit; font-size:12px; }
    .sess.active { background:#141925; box-shadow:inset 0 0 0 1px var(--sky-dim); }
    .sess.active .sname { color:var(--sky); }
    .sess .sname { font-weight:600; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:7px; }
    .sess .smeta { color:var(--muted); font-size:9.5px; margin-top:3px; padding-left:16px; }
    .sess .rproj { color:var(--body); }
    .sdot { width:6px;height:6px;border-radius:50%;background:var(--sky);flex:none;animation:pp 1.8s infinite; }
    @keyframes pp { 0%{box-shadow:0 0 0 0 rgba(95,176,255,.5)} 70%{box-shadow:0 0 0 5px rgba(95,176,255,0)} 100%{box-shadow:0 0 0 0 rgba(95,176,255,0)} }

    .center { flex:1; min-width:0; padding:16px 20px; }
    .summary { width:210px; flex:none; border-left:1px solid var(--line); padding:16px 13px; position:sticky; top:var(--head); align-self:stretch; }

    /* task cards */
    .card { position:relative; background:var(--card); border:1px solid #283040; border-radius:11px; padding:13px 16px; margin-bottom:10px; overflow:hidden; }
    .grp .card:last-child { margin-bottom:2px; }
    .card.open { background:#151a23; }
    .card.warn { border-color:#3a3324; }
    .card::before { content:""; position:absolute; inset:0; border-radius:11px; padding:1px; opacity:0; transition:opacity .25s; pointer-events:none;
      background:linear-gradient(110deg,transparent 20%,var(--sky) 50%,transparent 80%); background-size:200% 100%;
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
    .card:hover::before, .card.open::before { opacity:.6; animation:beam 3s linear infinite; }
    @keyframes beam { to { background-position:-200% 0; } }
    .row { display:flex; align-items:center; gap:13px; cursor:pointer; position:relative; }
    .row:focus-visible { outline:2px solid var(--sky); outline-offset:3px; border-radius:6px; }
    .chev { color:#5b6470; font-size:11px; flex:none; }
    .card.open .chev { color:var(--sky); }
    .nm { flex:1; min-width:0; }
    .nm .name { font-weight:600; font-size:14px; color:var(--ink); display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
    .nm .sub { color:var(--body); font-size:12px; margin-top:4px; line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .right { display:flex; align-items:center; gap:18px; flex:none; }
    .meta { text-align:right; font-size:9.5px; color:var(--muted); line-height:1.5; }
    .meta .ok { color:var(--green); }
    /* token chip (bordered, share bar inside) */
    .chip { padding:7px 12px 8px; border-radius:9px; border:1px solid #283246; background:var(--inset); min-width:112px; }
    .chip .top { display:flex; align-items:baseline; justify-content:flex-end; gap:5px; }
    .chip .tok { font-weight:700; font-size:16px; color:var(--ink); }
    .chip .u { color:var(--muted); font-size:10px; }
    .chip .bar { height:3px; background:#1b2230; border-radius:2px; margin-top:7px; }
    .chip .bar > i { display:block; height:3px; background:linear-gradient(90deg,var(--sky-dim),var(--sky)); border-radius:2px; }
    .pill { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }
    .pill.amber { background:#2a2113; color:var(--amber); }

    /* per-prompt group: an outer card that visibly contains its task cards */
    .grp { background:#0f1219; border:1px solid var(--line); border-radius:14px; padding:14px 15px 11px; margin-bottom:18px; }
    .grp.live { border-color:#2f4f74; box-shadow:0 0 0 1px rgba(95,176,255,.10); }
    .grphd { display:flex; align-items:flex-start; gap:14px; padding:0 1px 12px; margin-bottom:13px; border-bottom:1px solid var(--line); }
    .grphd .gp { flex:1; min-width:0; }
    .geyebrow { display:block; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--sky); margin-bottom:5px; font-weight:600; }
    .geyebrow.glive .rdot { margin-right:5px; }
    .gtext { font-size:14.5px; font-weight:600; color:var(--ink); line-height:1.42;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .grpmeta { flex:none; text-align:right; font-size:10px; color:var(--muted); line-height:1.7; white-space:nowrap; }
    .grpmeta .gtok { color:var(--ink2); font-weight:600; }
    .grpmeta .running { color:var(--sky); font-weight:600; }
    .grpmeta .rdot { display:inline-block; width:6px;height:6px;border-radius:50%;background:var(--sky);margin-right:4px;animation:pp 1.6s infinite;vertical-align:middle; }
    .grpnote { color:var(--muted); font-size:11.5px; padding:8px 4px 2px; }
    /* time bits on a task card */
    .meta .mtime { color:var(--body); }
    .meta .mdur { color:var(--ink2); }
    .meta .mdur .rdot { display:inline-block; width:5px;height:5px;border-radius:50%;background:var(--sky);margin-right:3px;animation:pp 1.6s infinite; }
    .running { color:var(--sky); font-weight:600; }
    .rdot { display:inline-block; width:6px;height:6px;border-radius:50%;background:var(--sky);margin-right:4px;animation:pp 1.6s infinite;vertical-align:middle; }
    .timer { font-variant-numeric:tabular-nums; }

    /* receipt */
    .rcpt { margin-top:13px; background:var(--inset); border:1px solid #1e2636; border-radius:9px; overflow:hidden; }
    .rhead { display:flex; align-items:center; gap:8px; padding:9px 14px; background:#0e131d; border-bottom:1px solid #1c2433; cursor:pointer; user-select:none; }
    .rhead:hover .ttl { color:#fff; }
    .rhead:focus-visible { outline:2px solid var(--sky); outline-offset:-2px; }
    .rhead .x { color:var(--sky); font-size:10px; width:10px; }
    .rhead .ttl { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink2); font-weight:600; }
    .rhead .colh { margin-left:auto; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .rhead .tot { color:var(--ink2); font-weight:600; font-size:12px; margin-left:14px; }
    .rline { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid #141b27; transition:background .15s; }
    .rline.can { cursor:pointer; }
    .rline.can:hover, .rline.lo { background:#0e131d; }
    .lchev { width:9px; flex:none; color:#5b6470; font-size:9px; }
    .rline.lo .lchev { color:var(--sky); }
    .lchev.sp { visibility:hidden; }
    .sw { width:6px;height:6px;border-radius:2px;background:var(--sky);flex:none;box-shadow:0 0 7px rgba(95,176,255,.5); }
    .sw.think { background:var(--violet); box-shadow:0 0 7px rgba(155,140,255,.5); }
    .sw.fail { background:var(--coral); box-shadow:0 0 7px rgba(240,101,79,.5); }
    .lbl { flex:1; font-size:12.5px; color:var(--ink2); }
    .tag { font-size:10px; font-family:ui-monospace,monospace; padding:2px 7px; border-radius:5px; flex:none; }
    .tag.tool { background:rgba(95,176,255,.1); color:#8fc3ff; border:1px solid rgba(95,176,255,.18); }
    .tag.think { background:rgba(155,140,255,.1); color:#b3a8ff; border:1px solid rgba(155,140,255,.2); }
    .num { width:64px; text-align:right; font-size:12.5px; color:var(--ink); font-weight:500; }
    .st { width:20px; text-align:right; font-size:11px; color:#5b6470; }
    .st.ok { color:var(--green); }
    .st.fail { color:var(--coral); font-weight:600; }
    /* plain-English failure note, shown inline under a failed line */
    .failnote { padding:0 14px 9px 47px; margin-top:-4px; border-bottom:1px solid #141b27; font-size:11.5px; color:#e7b0a6; }
    .failnote .note { color:var(--muted); }
    /* expanded per-line detail: raw command/path + why + raw error */
    .ldetail { padding:4px 14px 12px 47px; border-bottom:1px solid #141b27; display:flex; flex-direction:column; gap:7px; }
    .ld { display:flex; gap:9px; align-items:baseline; }
    .ld .lk { flex:none; width:72px; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding-top:2px; }
    .ld code { font-family:ui-monospace,monospace; font-size:11.5px; color:#cdd3de; background:#0c1018; border:1px solid #1c2433; border-radius:6px; padding:5px 8px; white-space:pre-wrap; word-break:break-word; flex:1; }
    .ld .lv { font-size:12px; color:var(--body); line-height:1.5; flex:1; }
    .ld.err code { color:#e7b0a6; border-color:#3a2024; background:#1c1416; }
    /* background context, JS-toggled so it survives the live refresh */
    .ctx { border-top:1px solid #1c2433; }
    .ctxsum { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; user-select:none; }
    .ctxsum:focus-visible { outline:2px solid var(--sky); outline-offset:-2px; }
    .ctxsum .cx { color:#5b6470; font-size:10px; width:10px; }
    .ctx.open .ctxsum .cx { color:var(--sky); }
    .ctxsum .ctt { font-size:11px; color:var(--muted); letter-spacing:.03em; }
    .ctxsum .ctot { margin-left:auto; color:var(--muted); font-size:11px; }
    .ctx .note { padding:2px 14px 11px 32px; font-size:10.5px; color:var(--body); line-height:1.55; max-width:640px; }

    /* summary panel */
    .scard { background:#12151d; border:1px solid #1e2636; border-radius:10px; padding:12px 13px; margin-bottom:10px; }
    .scard .k { font-size:8.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin-bottom:6px; }
    .big { font-weight:700; font-size:21px; color:var(--sky); line-height:1; }
    .big .u { font-size:9px; font-weight:400; color:var(--muted); margin-left:3px; }
    .subline { font-size:9.5px; color:var(--muted); margin-top:7px; }
    .pair { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; gap:10px; }
    .pair span { font-size:11px; color:var(--body); }
    .pair b { font-size:11px; color:var(--ink2); text-align:right; }
    .status-ok { color:var(--green); font-weight:600; font-size:13px; }
    .status-stuck { color:var(--amber); font-weight:600; font-size:12px; }
    .expl { font-size:9.5px; color:var(--body); line-height:1.55; }
    .expl .t { color:var(--sky); font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-size:8px; display:block; margin-bottom:5px; }

    /* intervention bar (Plan 3, preserved) */
    .intervene { margin:12px 0 2px; border:1px solid #3a3324; background:#191510; border-radius:10px; padding:12px 14px; }
    .intervene-head { display:flex; align-items:center; gap:8px; font-size:13px; color:#e8d9b8; margin-bottom:10px; }
    .intervene-head .ico { color:var(--amber); }
    .intervene .mono { font-family:ui-monospace,monospace; font-size:12px; color:#b9c0cc; }
    .intervene-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .ibtn { border:1px solid #39414f; background:transparent; color:#d7dce4; border-radius:8px; padding:8px 14px; font:inherit; font-size:13px; font-weight:500; cursor:pointer; }
    .ibtn.primary { background:var(--sky); color:#06223d; border:none; font-weight:600; }
    .ibtn.ghost { border-color:#2a313d; color:#9aa3b2; }
    .ibtn:not(.primary):hover { border-color:#4a3f25; }
    .ibtn:disabled { opacity:.5; cursor:default; }
    .intervene-note { font-size:11.5px; color:#6b7280; margin-top:9px; }
    .intervene-after .sent { color:var(--green); font-weight:600; font-size:13px; }
    .intervene-after .do { color:var(--muted); font-size:12.5px; margin:8px 0; }
    .intervene-after .copy { display:flex; align-items:center; gap:8px; background:var(--inset); border:1px solid #20283a; border-radius:8px; padding:8px 10px; }
    .intervene-after .copy code { flex:1; font-family:ui-monospace,monospace; font-size:12.5px; color:#cdd3de; word-break:break-word; }
    .copybtn { flex:none; background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:4px 10px; font:inherit; font-size:12px; cursor:pointer; }
    .copybtn:hover { border-color:var(--sky); }

    .empty { color:var(--muted); padding:48px 0; text-align:center; }

    /* Active Terminals grid: fills the page, adapts to how many are open */
    .splitwrap { display:flex; flex-direction:column; gap:10px; height:calc(100vh - var(--head) - 32px); }
    .grid { display:grid; gap:12px; flex:1; min-height:0; grid-auto-rows:minmax(0,1fr); }
    .grid.n1 { grid-template-columns:1fr; }
    .grid.n2 { grid-template-columns:repeat(2,1fr); }
    .grid.n3 { grid-template-columns:repeat(3,1fr); }
    .pane { position:relative; background:#0f131b; border:1px solid #232c3c; border-radius:11px; overflow:hidden; display:flex; flex-direction:column; min-height:0; height:100%; }
    .pane.run { border-color:#2f4f74; }
    .pane.run::before { content:""; position:absolute; inset:0; border-radius:11px; padding:1px; pointer-events:none;
      background:linear-gradient(110deg,transparent 25%,var(--sky) 50%,transparent 75%); background-size:200% 100%;
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:beam 3s linear infinite; opacity:.55; }
    .phead { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid #1b2331; background:#0c1018; flex-wrap:wrap; }
    .phead .pname { font-weight:600; font-size:12.5px; color:var(--ink); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .phead .pproj { font-size:10px; color:var(--body); background:#11151d; border:1px solid #232c3c; border-radius:5px; padding:1px 6px; }
    .phead .pwork { font-size:10px; color:var(--muted); } .phead .pwork b { color:var(--sky); }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:9.5px; font-weight:600; color:#bfe0ff; background:rgba(95,176,255,.12); border:1px solid rgba(95,176,255,.32); }
    .pbody { padding:9px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1; min-height:0; }
    .pbody .card { margin-bottom:0; }
    .ptc { background:#141925; border:1px solid #232c3c; border-radius:8px; padding:8px 10px; }
    .ptc.cur { background:#141b27; border-color:#2f4f74; }
    .ptcr { display:flex; align-items:flex-start; gap:8px; }
    .ptcr .pn { flex:1; min-width:0; } .ptcr .pn b { font-size:11.5px; font-weight:600; color:var(--ink2); }
    .ptcr .pn span { display:block; font-size:9.5px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pchip { display:inline-flex; align-items:baseline; gap:3px; padding:3px 7px; border-radius:7px; border:1px solid rgba(95,176,255,.25); background:rgba(95,176,255,.06); flex:none; }
    .pchip b { font-size:11px; font-weight:700; color:var(--sky); } .pchip small { font-size:8px; color:var(--muted); }
    .prun { display:flex; align-items:center; gap:6px; font-size:9.5px; color:#bfe0ff; padding-top:4px; }
    .prun .pip { width:5px;height:5px;border-radius:50%;background:var(--sky);animation:pp 1.4s infinite; }
    .pager { display:flex; align-items:center; justify-content:center; gap:14px; padding:6px; flex:none; }
    .pager .nav { width:28px;height:28px;border-radius:7px;border:1px solid #283246;background:#10141d;color:var(--ink2);font:inherit;font-size:13px;cursor:pointer; }
    .pager .nav:hover { border-color:var(--sky); color:var(--sky); }
    .pager .nav:disabled { opacity:.4; cursor:default; }
    .dots { display:flex; gap:6px; } .dot { width:7px;height:7px;border-radius:50%;background:#2a3344; }
    .dot.on { background:var(--sky); box-shadow:0 0 7px rgba(95,176,255,.5); }
    .prange { font-size:11.5px; color:var(--ink2); font-weight:500; }

    @media (prefers-reduced-motion: reduce) {
      .eq i, .sdot, .cdot.run, .card::before, .pane.run::before, .prun .pip { animation:none; }
      .chip .bar > i { transition:none; }
    }
    @media (max-width: 1000px) {
      .summary { display:none; }
      .grid.n3 { grid-template-columns:repeat(2,1fr); }
    }
    @media (max-width: 680px) {
      .rail { display:none; }
      .grid.n2, .grid.n3 { grid-template-columns:1fr; }
      .rline .tag { display:none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="eyebrow disp">Codey Timeline</span>
    <span class="livewrap idle" id="livewrap"><span class="eq"><i></i><i></i><i></i><i></i></span><b id="livecount">0</b><span id="livelabel">idle</span></span>
    <div class="toggle">
      <button id="tb-single" class="on" type="button">Single terminal</button>
      <button id="tb-split" type="button">Active terminals</button>
    </div>
    <button id="jumplive" class="jumplive" type="button" hidden>Jump to live</button>
  </div>

  <div class="titlerow" id="titlerow">
    <span class="sproj" id="sproj"></span>
    <h1 class="stitle disp" id="sname">Codey</h1>
    <button class="renamebtn" id="rename-current" type="button" title="Rename this terminal" aria-label="Rename this terminal">&#9998;</button>
  </div>

  <div class="cols">
    <aside class="rail" id="rail" aria-label="Sessions"></aside>
    <main class="center" id="main"></main>
    <aside class="summary" id="summary"></aside>
  </div>

  <script>
    const fmt = (n) => Number(n || 0).toLocaleString();
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const kfmt = (n) => {
      if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
      return String(n);
    };
    function ago(ms) {
      if (!ms) return "";
      const s = Math.max(0, Math.floor((Date.now() - ms) / 1000));
      if (s < 60) return "just now";
      if (s < 3600) return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }
    // Matches the TS formatDuration: "45s", "3m 12s", "1h 04m".
    function fmtDur(ms) {
      const total = Math.max(0, Math.round(ms / 1000));
      if (total < 60) return (total || 1) + "s";
      const m = Math.floor(total / 60), s = total % 60;
      if (m < 60) return s ? m + "m " + s + "s" : m + "m";
      const h = Math.floor(m / 60), rm = m % 60;
      return h + "h " + String(rm).padStart(2, "0") + "m";
    }
    const fmtClock = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
    const fmtClockSec = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }) : "";
    // A live, ticking elapsed span (updated by the 1s ticker); used for running tasks/groups.
    const liveTimer = (sinceTs) => `<span class="timer" data-since="${sinceTs}">${fmtDur(Date.now() - sinceTs)}</span>`;

    const open = new Set();        // expanded chunk ids (whole card)
    const lineOpen = new Set();    // expanded work lines, key "chunkId:idx"
    const workCollapsed = new Set();// folded work lists, by chunk id (default expanded)
    const confirmed = new Map();   // chunk id -> intervention action (survives the live re-render)
    let view = "single";           // "single" | "split"
    let currentId = new URLSearchParams(location.search).get("session");
    let pinned = !!currentId;      // a manual pick stops follow-newest
    let splitPage = 1;
    let splitPinned = false;
    let lastSessions = [];         // last /api/sessions payload, for search re-render without refetch
    let railFilter = "";           // sidebar search text
    let renamingId = null;         // session id being renamed inline (pauses rail refresh)

    // ---- Intervention (Plan 3), preserved ----
    const FALLBACK = {
      nudge: { label: "Nudge it to move on", do: "If Claude keeps repeating it, press Esc to interrupt, then paste this so it skips the stuck step:",
        type: "You're looping on {tool}. Stop retrying that step and move on to the rest of the task." },
      different: { label: "Try a different approach", do: "If Claude keeps hitting the same error, press Esc, then paste this to push it toward a new method:",
        type: "{tool} keeps failing the same way. Stop and try a clearly different approach. If you know why it's failing, fix that cause first." },
      stop: { label: "Stop & ask me", do: "To take over right now, press Esc, then tell Claude what you want. You can start with:",
        type: "Stop what you're doing and wait. I want to take over and tell you what to do next." },
    };
    function stuckPhrase(w) {
      if (w.kind === "repeat_error") return `hit the same error ${w.count} times`;
      if (w.kind === "hang") return "been stuck on this step for a while";
      return `tried the same step ${w.count} times`;
    }
    function confirmedHtml(action, tool) {
      const f = FALLBACK[action];
      const typed = f.type.replace("{tool}", tool);
      return `<div class="intervene confirmed" data-tool="${esc(tool)}" data-action="${esc(action)}"><div class="intervene-after">`
        + `<div class="sent">&#10003; Sent &ldquo;${esc(f.label)}.&rdquo; It lands on Claude's next <span class="mono">${esc(tool)}</span> call.</div>`
        + `<div class="do">${esc(f.do)}</div>`
        + `<div class="copy"><code>${esc(typed)}</code><button class="copybtn" type="button">Copy</button></div></div></div>`;
    }
    function interventionBar(warning, chunkId) {
      const tool = warning.tool;
      const action = confirmed.get(chunkId);
      if (action) return confirmedHtml(action, tool);
      return `<div class="intervene" data-tool="${esc(tool)}" data-chunk="${esc(chunkId)}">`
        + `<div class="intervene-head"><span class="ico">&#9888;</span> Claude has ${esc(stuckPhrase(warning))}. Want to step in?</div>`
        + `<div class="intervene-btns">`
        + `<button class="ibtn primary" type="button" data-action="nudge">Nudge it to move on</button>`
        + `<button class="ibtn" type="button" data-action="different">Try a different approach</button>`
        + `<button class="ibtn ghost" type="button" data-action="stop">Stop &amp; ask me</button></div>`
        + `<div class="intervene-note">Sends Claude a note on its next step. Takes effect within a second or two; doesn't cancel your message.</div></div>`;
    }
    function warningPill(ws) {
      const rep = ws.find((w) => w.kind === "repeat_error");
      if (rep) return `<span class="pill amber">&#9888; same error &times;${rep.count}</span>`;
      const loop = ws.find((w) => w.kind === "loop");
      if (loop) return `<span class="pill amber">&#9888; same step &times;${loop.count}</span>`;
      return "";
    }

    // ---- Receipt ----
    function actionCount(receipt) { return receipt.workLines.filter((l) => l.status !== "none").length; }

    function lineDetail(l) {
      const parts = [];
      if (l.ts) parts.push(`<div class="ld"><span class="lk">at</span><span class="lv">${fmtClockSec(l.ts)}</span></div>`);
      if (l.raw) parts.push(`<div class="ld"><span class="lk">ran</span><code>${esc(l.raw)}</code></div>`);
      if (l.why) parts.push(`<div class="ld"><span class="lk">explanation</span><span class="lv">${esc(l.why)}</span></div>`);
      if (l.status === "fail" && l.errorText) parts.push(`<div class="ld err"><span class="lk">error</span><code>${esc(l.errorText)}</code></div>`);
      if (!parts.length) parts.push(`<div class="ld"><span class="lv">No extra detail for this step.</span></div>`);
      return `<div class="ldetail">${parts.join("")}</div>`;
    }

    function workLineHtml(c, l, idx) {
      const think = l.tool === "thinking";
      const sw = l.status === "fail" ? "sw fail" : think ? "sw think" : "sw";
      const tag = think ? `<span class="tag think">thinking</span>` : `<span class="tag tool">${esc(l.tool)}</span>`;
      const st = l.status === "fail" ? '<span class="st fail">fail</span>'
        : l.status === "ok" ? '<span class="st ok">&#10003;</span>' : '<span class="st">&middot;</span>';
      const key = c.id + ":" + idx;
      const lo = lineOpen.has(key);
      const canExpand = !!(l.raw || l.why || l.ts || (l.status === "fail" && l.errorText));
      const chev = canExpand ? `<span class="lchev">${lo ? "&#9662;" : "&#9656;"}</span>` : `<span class="lchev sp"></span>`;
      const fail = l.status === "fail" && l.failSummary
        ? `<div class="failnote">${esc(l.failSummary)}${l.resolved ? ' <span class="note">&middot; recovered on the next try</span>' : ""}</div>` : "";
      return `<div class="rline${canExpand ? " can" : ""}${lo ? " lo" : ""}" data-line="${esc(key)}">`
        + `${chev}<span class="${sw}"></span><span class="lbl">${esc(l.label)}</span>${tag}<span class="num">${fmt(l.tokens)}</span>${st}</div>`
        + fail + (lo ? lineDetail(l) : "");
    }

    function receiptHtml(c) {
      const r = c.receipt;
      const collapsed = workCollapsed.has(c.id);
      const wchev = collapsed ? "&#9656;" : "&#9662;";
      const work = collapsed ? "" : r.workLines.map((l, idx) => workLineHtml(c, l, idx)).join("");
      return `<div class="rcpt">`
        + `<div class="rhead js-work" role="button" tabindex="0" aria-expanded="${!collapsed}" data-id="${c.id}">`
        + `<span class="x">${wchev}</span><span class="ttl">Work Claude did</span><span class="colh">tokens</span><span class="tot">${fmt(c.workTotal)}</span></div>`
        + work
        + `</div>`;
    }

    // A task is still open (running) when its end is past the last recorded activity; in a
    // live session that one ticks, otherwise we show how long it took.
    function durLabel(c, snap) {
      const openEnd = c.endTs > snap.lastActivityAt;
      if (openEnd && snap.live) return `<span class="running"><span class="rdot"></span>${liveTimer(c.startTs)}</span>`;
      const end = openEnd ? snap.lastActivityAt : c.endTs;
      return c.startTs ? `took ${fmtDur(end - c.startTs)}` : "";
    }

    function cardHtml(c, maxWork, barWarning, snap) {
      const isOpen = open.has(c.id);
      const pct = maxWork > 0 ? Math.round((c.workTotal / maxWork) * 100) : 0;
      const cls = "card" + (isOpen ? " open" : "") + (c.warnings.length ? " warn" : "");
      const chev = isOpen ? "&#9662;" : "&#9656;";
      const acts = actionCount(c.receipt);
      const done = c.warnings.length ? "" : '<span class="ok">&#10003; done</span>';
      return `<div class="${cls}" data-id="${c.id}">`
        + `<div class="row js-toggle" role="button" tabindex="0" aria-expanded="${isOpen}">`
        + `<span class="chev">${chev}</span>`
        + `<div class="nm"><div class="name">${esc(c.name)} ${warningPill(c.warnings)}</div><div class="sub">${esc(c.narration)}</div></div>`
        + `<div class="right"><div class="meta"><div class="mtime">${fmtClock(c.startTs)}</div><div class="mdur">${durLabel(c, snap)}</div><div>${acts} action${acts === 1 ? "" : "s"} ${done}</div></div>`
        + `<div class="chip"><div class="top"><span class="tok">${fmt(c.workTotal)}</span><span class="u">tokens</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`
        + `</div></div>`
        + (isOpen ? receiptHtml(c) : "")
        + (barWarning ? interventionBar(barWarning, c.id) : "")
        + `</div>`;
    }

    function groupHtml(g, maxWork, snap, barFor) {
      const dur = g.live
        ? `<span class="running"><span class="rdot"></span>${liveTimer(g.startTs)}</span>`
        : fmtDur(g.durationMs || 0);
      const cards = g.chunks.map((c) => cardHtml(c, maxWork, barFor(c), snap)).join("")
        || `<div class="grpnote">${g.live ? "Working on it…" : "Answered directly, no tools used."}</div>`;
      const eyebrow = g.live
        ? `<span class="geyebrow glive"><span class="rdot"></span>You asked &middot; working now</span>`
        : `<span class="geyebrow">You asked</span>`;
      return `<section class="grp${g.live ? " live" : ""}">`
        + `<div class="grphd"><div class="gp">${eyebrow}<span class="gtext">${esc(g.prompt)}</span></div>`
        + `<div class="grpmeta">${fmtClock(g.startTs)} &middot; ${dur} &middot; <span class="gtok">${fmt(g.workTotal)} tokens</span> &middot; ${g.taskCount} task${g.taskCount === 1 ? "" : "s"}</div>`
        + `</div>${cards}</section>`;
    }

    function renderSummary(snap) {
      const stuck = snap.activeWarning;
      const status = stuck
        ? `<div class="status-stuck">&#9888; ${esc(stuckPhrase(snap.activeWarning))}</div>`
        : `<div class="status-ok">&#10003; On track</div>`;
      const sessDur = snap.live
        ? `<span class="running"><span class="rdot"></span>${liveTimer(snap.startedAt)}</span>`
        : fmtDur((snap.lastActivityAt || snap.startedAt) - snap.startedAt);
      document.getElementById("summary").innerHTML =
        `<p class="rh">This session</p>`
        + `<div class="scard"><div class="k">Work done</div><div class="big">${fmt(snap.workTotal)} <span class="u">tokens</span></div><div class="subline">what Claude actually generated</div></div>`
        + `<div class="scard"><div class="k">Time</div><div class="big" style="font-size:18px">${sessDur}</div><div class="subline">${snap.live ? "running now" : "total session time"}</div></div>`
        + `<div class="scard"><div class="k">Overview</div><div class="pair"><span>Tasks</span><b>${snap.taskCount}</b></div>`
        + `<div class="pair"><span>Priciest</span><b>${esc(snap.priciestTaskName || "none")}</b></div></div>`
        + `<div class="scard"><div class="k">Status</div>${status}</div>`;
    }

    function renderHeader(snap) {
      document.getElementById("sname").textContent = snap.sessionName;
      const el = document.getElementById("sproj");
      el.innerHTML = `<span class="cdot${snap.live ? " run" : ""}" style="background:${esc(snap.color || "#5fb0ff")}"></span>`
        + (snap.project ? `<span class="ptag">${esc(snap.project)}</span>` : "");
    }

    function sessRowHtml(s) {
      const active = s.id === currentId ? " active" : "";
      const proj = s.project ? ` &middot; ${esc(s.project)}` : "";
      if (s.id === renamingId) {
        return `<div class="sessrename" data-id="${esc(s.id)}">`
          + `<input class="rename-in" type="text" value="${esc(s.name)}" aria-label="New name" /></div>`;
      }
      return `<button class="sess${active}" data-id="${esc(s.id)}" type="button">`
        + `<span class="sname"><span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>${esc(s.name)}</span>`
        + `<span class="smeta">${ago(s.mtime)} &middot; ${s.taskCount} task${s.taskCount === 1 ? "" : "s"}${proj}</span>`
        + `<span class="sessacts">`
        + `<button class="ren" type="button" title="Rename" aria-label="Rename">&#9998;</button>`
        + `<button class="del" type="button" title="Delete" aria-label="Delete">&#128465;</button>`
        + `</span></button>`;
    }

    function renderRail(sessions) {
      const q = railFilter.trim().toLowerCase();
      const shown = q
        ? sessions.filter((s) => (s.name + " " + (s.project || "")).toLowerCase().includes(q))
        : sessions;
      // Group by day, preserving the most-recent-first order the server already sorted by.
      const days = [];
      const byDay = new Map();
      for (const s of shown) {
        const d = s.day || "Earlier";
        if (!byDay.has(d)) { byDay.set(d, []); days.push(d); }
        byDay.get(d).push(s);
      }
      const groups = days.map((d) =>
        `<div class="dayhd">${esc(d)}</div>` + byDay.get(d).map(sessRowHtml).join("")).join("");
      const empty = q ? "No terminals match." : "No terminals yet.";
      document.getElementById("rail").innerHTML =
        `<p class="rh">Sessions</p>`
        + `<input class="railsearch" id="railsearch" type="search" placeholder="Search terminals" value="${esc(railFilter)}" />`
        + (shown.length ? groups : `<p class="smeta" style="padding-left:3px">${empty}</p>`);

      const search = document.getElementById("railsearch");
      if (search) search.addEventListener("input", (e) => { railFilter = e.target.value; renderRail(lastSessions); });

      document.querySelectorAll("#rail .sess").forEach((el) => {
        el.addEventListener("click", (e) => {
          if (e.target.closest(".sessacts")) return; // a row-action click is not a select
          currentId = el.dataset.id; pinned = true;
          open.clear(); tickSingle();
        });
      });
      document.querySelectorAll("#rail .sessacts .ren").forEach((b) =>
        b.addEventListener("click", (e) => { e.stopPropagation(); startRename(b.closest(".sess").dataset.id); }));
      document.querySelectorAll("#rail .sessacts .del").forEach((b) =>
        b.addEventListener("click", (e) => { e.stopPropagation(); deleteSession(b.closest(".sess").dataset.id); }));

      const input = document.querySelector("#rail .rename-in");
      if (input) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        const commit = () => commitRename(renamingId, input.value);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          else if (e.key === "Escape") { e.preventDefault(); renamingId = null; renderRail(lastSessions); }
        });
        input.addEventListener("blur", commit);
      }
    }

    function startRename(id) { renamingId = id; renderRail(lastSessions); }

    async function commitRename(id, name) {
      if (!id) return;
      renamingId = null;
      try {
        await fetch("/api/session/" + encodeURIComponent(id) + "/name", {
          method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name }),
        });
      } catch { /* keep going; the rail will refetch on the next tick */ }
      tickSingle();
    }

    async function deleteSession(id) {
      const s = lastSessions.find((x) => x.id === id);
      if (!confirm("Delete " + (s ? s.name : "this terminal") + " from the timeline? This cannot be undone.")) return;
      try { await fetch("/api/session/" + encodeURIComponent(id), { method: "DELETE" }); } catch { /* refetch handles it */ }
      if (currentId === id) { currentId = null; pinned = false; }
      tickSingle();
    }

    function renderSingle(snap) {
      renderHeader(snap);
      renderSummary(snap);
      const chunks = snap.chunks || [];
      const groups = snap.groups || [];
      const maxWork = Math.max(1, ...chunks.map((c) => c.workTotal));
      const main = document.getElementById("main");
      if (!snap.activeWarning) confirmed.clear();
      const lastId = chunks.length ? chunks[chunks.length - 1].id : null;
      const barFor = (c) => (snap.live && snap.activeWarning && c.id === lastId ? snap.activeWarning : null);

      main.innerHTML = groups.length
        ? groups.map((g) => groupHtml(g, maxWork, snap, barFor)).join("")
        : (chunks.length
          ? chunks.map((c) => cardHtml(c, maxWork, barFor(c), snap)).join("")
          : '<div class="empty">No activity recorded for this session yet.</div>');

      wireCards(main, () => renderSingle(snap));
      wireIntervention(main);
    }

    // Shared expand/collapse wiring for task cards, used by both Single and Active Terminals.
    function wireCards(scope, rerender) {
      const wire = (sel, fn) => scope.querySelectorAll(sel).forEach((el) => {
        const run = () => { fn(el); rerender(); };
        el.addEventListener("click", (e) => { e.stopPropagation(); run(); });
        el.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); run(); } });
      });
      wire(".js-toggle", (el) => { const id = el.closest(".card").dataset.id; open.has(id) ? open.delete(id) : open.add(id); });
      wire(".js-work", (el) => { const id = el.dataset.id; workCollapsed.has(id) ? workCollapsed.delete(id) : workCollapsed.add(id); });
      wire(".rline.can", (el) => { const k = el.dataset.line; lineOpen.has(k) ? lineOpen.delete(k) : lineOpen.add(k); });
    }

    function wireIntervention(scope) {
      scope.querySelectorAll(".intervene").forEach((barEl) => {
        const tool = barEl.dataset.tool;
        barEl.querySelectorAll(".ibtn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            barEl.querySelectorAll(".ibtn").forEach((b) => (b.disabled = true));
            try {
              await fetch("/api/session/" + encodeURIComponent(currentId) + "/intervene", {
                method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action }),
              });
            } catch { /* the Esc path is the real stop */ }
            confirmed.set(barEl.dataset.chunk, action);
            tickSingle();
          });
        });
        const copyBtn = barEl.querySelector(".copybtn");
        if (copyBtn) copyBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          navigator.clipboard?.writeText(FALLBACK[barEl.dataset.action].type.replace("{tool}", tool));
          copyBtn.textContent = "Copied";
        });
      });
    }

    // ---- polling ----
    async function tickSingle() {
      let sessions = [];
      try { sessions = await (await fetch("/api/sessions")).json(); } catch { sessions = []; }
      lastSessions = sessions;
      if (!pinned && sessions[0]) currentId = sessions[0].id;
      const anyRunning = sessions.some((s) => s.running);
      updateLiveBadge(sessions.filter((s) => s.running).length);
      // Don't redraw the rail mid-rename or the input loses focus and the typed text.
      if (!renamingId) renderRail(sessions);
      // Only offer "Jump to live" when there is something live to jump to.
      document.getElementById("jumplive").hidden = !(pinned && anyRunning);
      if (!currentId) { document.getElementById("main").innerHTML = '<div class="empty">No sessions found.</div>'; return; }
      try {
        const snap = await (await fetch("/api/session/" + encodeURIComponent(currentId))).json();
        renderSingle(snap);
      } catch { /* keep last view on a transient error */ }
    }

    document.getElementById("jumplive").addEventListener("click", () => {
      pinned = false; document.getElementById("jumplive").hidden = true; tick();
    });
    document.getElementById("tb-single").addEventListener("click", () => setView("single"));
    document.getElementById("tb-split").addEventListener("click", () => setView("split"));
    document.getElementById("rename-current").addEventListener("click", () => {
      if (currentId) startRename(currentId);
    });
    function setView(v) {
      view = v;
      document.body.classList.toggle("split", v === "split");
      document.getElementById("tb-single").classList.toggle("on", v === "single");
      document.getElementById("tb-split").classList.toggle("on", v === "split");
      document.getElementById("rail").style.display = v === "split" ? "none" : "";
      document.getElementById("summary").style.display = v === "split" ? "none" : "";
      document.getElementById("jumplive").hidden = true;
      tick();
    }

    function updateLiveBadge(n) {
      document.getElementById("livecount").textContent = n;
      const wrap = document.getElementById("livewrap");
      // Always visible: when 0 it shows a calm "idle" state so a still badge never looks frozen.
      wrap.classList.toggle("idle", n === 0);
      document.getElementById("livelabel").textContent = n === 0 ? "idle" : "live";
    }

    // ---- Active Terminals (multi-session) ----
    const SPLIT_PER_PAGE = 2;
    let lastLive = null; // keep the last payload so pager clicks re-render without a refetch

    function paneHtml(s, isFirst) {
      const cls = "pane" + (s.runningTool ? " run" : "");
      const pill = isFirst && s.running ? `<span class="badge">&#10022; Just prompted</span>` : "";
      const proj = s.project ? `<span class="pproj">${esc(s.project)}</span>` : "";
      // Namespace each chunk id with the session so the same card index in two panes does not
      // share expand state. Render the full Single-view card so panes get the same receipts.
      const chunks = s.chunks.map((c) => ({ ...c, id: s.sessionId + "~" + c.id }));
      const lastFinite = chunks.reduce((m, c) => {
        const e = c.endTs < 1e15 ? c.endTs : c.startTs;
        return e > m ? e : m;
      }, 0) || Date.now();
      const pseudo = { live: s.running, lastActivityAt: lastFinite };
      const maxWork = Math.max(1, ...chunks.map((c) => c.workTotal));
      const cards = chunks.length
        ? chunks.map((c) => cardHtml(c, maxWork, null, pseudo)).join("")
        : '<div class="prun" style="padding:4px">just started</div>';
      const runl = s.runningTool ? `<div class="prun"><span class="pip"></span>running ${esc(s.runningTool)} now</div>` : "";
      return `<div class="${cls}"><div class="phead"><span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>`
        + `<span class="pname">${esc(s.name)}</span>${proj}${pill}`
        + `<span class="pwork"><b>${fmt(s.workTotal)}</b> tokens</span></div>`
        + `<div class="pbody">${cards}${runl}</div></div>`;
    }

    function renderSplit(live) {
      const sessions = live.sessions;
      updateLiveBadge(live.liveCount);
      document.getElementById("sname").textContent = "Active terminals";
      const main = document.getElementById("main");
      if (sessions.length === 0) {
        main.innerHTML = '<div class="empty">No terminals are open right now. Prompt Claude in any terminal to see it appear here.</div>';
        return;
      }
      const pages = Math.max(1, Math.ceil(sessions.length / SPLIT_PER_PAGE));
      if (!splitPinned) splitPage = 1;          // follow the front until the user pages
      splitPage = Math.min(Math.max(1, splitPage), pages);
      const start = (splitPage - 1) * SPLIT_PER_PAGE;
      const pageItems = sessions.slice(start, start + SPLIT_PER_PAGE);

      const grid = pageItems.map((s) => paneHtml(s, splitPage === 1 && s === sessions[0])).join("");
      const dots = Array.from({ length: pages }, (_, i) => `<span class="dot${i + 1 === splitPage ? " on" : ""}"></span>`).join("");
      const pager = pages > 1
        ? `<div class="pager"><button class="nav" id="pg-prev" type="button"${splitPage === 1 ? " disabled" : ""}>&#8249;</button>`
          + `<div class="dots">${dots}</div>`
          + `<button class="nav" id="pg-next" type="button"${splitPage === pages ? " disabled" : ""}>&#8250;</button>`
          + `<span class="prange">Page ${splitPage} of ${pages} &middot; most recent first</span></div>`
        : "";
      main.innerHTML = `<div class="splitwrap"><div class="grid n${pageItems.length}">${grid}</div>${pager}</div>`;

      const prev = document.getElementById("pg-prev");
      const next = document.getElementById("pg-next");
      if (prev) prev.addEventListener("click", () => { splitPinned = true; splitPage--; renderSplit(lastLive); });
      if (next) next.addEventListener("click", () => { splitPinned = true; splitPage++; renderSplit(lastLive); });
      wireCards(main, () => renderSplit(lastLive));
    }

    function tick() { if (view === "single") return tickSingle(); return tickSplit(); }
    async function tickSplit() {
      try {
        lastLive = await (await fetch("/api/live")).json();
        renderSplit(lastLive);
      } catch { /* keep the last view on a transient error */ }
    }

    // Tick live elapsed timers once a second between the 2s data polls, so running tasks,
    // groups and the session timer count up smoothly without hammering the server.
    setInterval(() => {
      document.querySelectorAll(".timer[data-since]").forEach((el) => {
        const since = Number(el.dataset.since);
        if (since > 0) el.textContent = fmtDur(Date.now() - since);
      });
    }, 1000);

    tick();
    setInterval(tick, 2000);
  </script>
</body>
</html>
