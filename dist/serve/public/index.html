        ? `<div class="failnote">${esc(l.failSummary)}${l.resolved ? ' <span class="note">&middot; recovered on the next try</span>' : ""}</div>` : "";
      const meta = lineMeta(l);
      // The collapsed row reads top to bottom: purpose title, the plain sentence, then the small
      // file/tool/time line. It is understandable without expanding; expanding only adds depth.
      const main = `<div class="lmain"><span class="lbl">${esc(l.title)}</span>`
        + `<span class="lsub">${esc(l.subtitle)}</span>`
        + (meta ? `<span class="lmeta">${meta}</span>` : "")
        + `</div>`;
      return `<div class="rline${canExpand ? " can" : ""}${lo ? " lo" : ""}${isCur ? " cur" : ""}" data-line="${esc(key)}">`
        + `${chev}<span class="${sw}"></span>${main}${tag}<span class="num">${fmt(l.tokens)}</span>${st}</div>`
        + fail + (lo ? lineDetail(c, l, idx) : "");
    }

    // The shared activity behind a work line, used to spot a run of the same kind of step. We key
    // on the tool, so consecutive steps of the same kind fold even when their targets differ
    // (three reads of different files become one "Read 3 files" dropdown). A lone "Thought about
    // what to do next." row keys to null and never merges.
    function activityKey(l) {
      if (l.tool === "thinking") return null;
      return (l.tool || "").toLowerCase().trim();
    }

    // Fold consecutive lines that share an activity key into a burst, but only when there are
    // enough of them to be worth hiding (3+). Shorter runs stay as plain rows. Indices are kept
    // so each child still maps to its real work line for "explain this step".
    function groupBursts(lines) {
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const key = activityKey(lines[i]);
        let j = i;
        if (key !== null) while (j + 1 < lines.length && activityKey(lines[j + 1]) === key) j++;
        if (key !== null && j - i + 1 >= 3) {
          const items = [];
          for (let k = i; k <= j; k++) items.push({ l: lines[k], idx: k });
          out.push({ burst: true, start: i, items });
        } else {
          for (let k = i; k <= j; k++) out.push({ burst: false, l: lines[k], idx: k });
        }
        i = j + 1;
      }
      return out;
    }

    // A purpose summary for a folded run of same-tool steps, framed by intent rather than tool:
    // "Creating 4 files", "Checking 3 files", "Running 3 commands".
    function burstSummary(tool, n) {
      const m = { Read: "Checking " + n + " files", Edit: "Updating " + n + " files", Write: "Creating " + n + " files",
        NotebookEdit: "Updating " + n + " files",
        Bash: "Running " + n + " commands", Grep: "Searching " + n + " times", Glob: "Searching " + n + " times" };
      return m[tool] || ("Working through " + n + " " + tool + " steps");
    }

    // The list of names a burst touched, for its subtitle ("math.js, string.js, and 2 more").
    function burstSubtitle(items) {
      const names = items.map((it) => metaSubject(it.l)).filter(Boolean);
      if (!names.length) return "A run of related steps, folded together.";
      const head = names.slice(0, 3).join(", ");
      const extra = names.length > 3 ? `, and ${names.length - 3} more` : "";
      return `Worked on ${head}${extra}.`;
    }

    // One collapsed burst: a parent row that summarizes the run, expanding to the real child rows.
    function burstHtml(c, g, curIdx) {
      const key = c.id + "|b" + g.start;
      const hasCur = g.items.some((it) => it.idx === curIdx);
      const childOpen = g.items.some((it) => lineOpen.has(c.id + ":" + it.idx));
      const isOpen = burstOpen.has(key) || hasCur || childOpen;
      const head = g.items[0].l;
      const think = head.tool === "thinking";
      const anyFail = g.items.some((it) => it.l.status === "fail");
      const tokens = g.items.reduce((s, it) => s + (it.l.tokens || 0), 0);
      const sw = anyFail ? "sw fail" : think ? "sw think" : "sw";
      const chev = `<span class="lchev">${isOpen ? "&#9662;" : "&#9656;"}</span>`;
      const st = anyFail ? '<span class="st fail">fail</span>' : '<span class="st ok">&#10003;</span>';
      const children = isOpen
        ? `<div class="bchildren">${g.items.map((it) => workLineHtml(c, it.l, it.idx, it.idx === curIdx)).join("")}</div>` : "";
      const main = `<div class="lmain"><span class="lbl">${esc(burstSummary(head.tool, g.items.length))}</span>`
        + `<span class="lsub">${esc(burstSubtitle(g.items))}</span>`
        + `<span class="lmeta">${g.items.length} ${head.tool === "thinking" ? "steps" : "items"} · ${esc(head.tool)}</span></div>`;
      return `<div class="rline brow${isOpen ? " lo" : ""}" data-burst="${esc(key)}">`
        + `${chev}<span class="${sw}"></span>${main}`
        + `<span class="tag steps">${g.items.length} steps</span><span class="num">${fmt(tokens)}</span>${st}</div>`
        + children;
    }

    function receiptHtml(c, liveTask) {
      const r = c.receipt;
      const collapsed = workCollapsed.has(c.id);
      const wchev = collapsed ? "&#9656;" : "&#9662;";
      const curIdx = liveTask ? currentLineIndex(r.workLines) : -1;
      const work = collapsed ? "" : groupBursts(r.workLines)
        .map((g) => g.burst ? burstHtml(c, g, curIdx) : workLineHtml(c, g.l, g.idx, g.idx === curIdx)).join("");
      return `<div class="rcpt">`
        + `<div class="rhead js-work" role="button" tabindex="0" aria-expanded="${!collapsed}" data-id="${c.id}">`
        + `<span class="x">${wchev}</span><span class="ttl">Work Claude did</span><span class="colh">tokens</span><span class="tot">${fmt(c.workTotal)}</span></div>`
        + work
        + `</div>`;
    }

    // A task is still open (running) when its end is past the last recorded activity; in a
    // live session that one ticks, otherwise we show how long it took.
    // Returns the bare duration string (no "took" prefix) for the inline .rmeta slot.
    function durLabel(c, snap) {
      const openEnd = c.endTs > snap.lastActivityAt;
      if (openEnd && snap.live) return `<span class="timer" data-since="${c.startTs}">${fmtDur(Date.now() - c.startTs)}</span>`;
      const end = openEnd ? snap.lastActivityAt : c.endTs;
      return c.startTs ? fmtDur(end - c.startTs) : "";
    }

    function cardHtml(c, barWarning, snap) {
      const isOpen = isCardOpen(c.id);
      // Panes pass their own live chunk id (one live task per terminal); the single view leaves it
      // unset and falls back to the global liveOpenId.
      const liveId = ("liveChunkId" in snap) ? snap.liveChunkId : liveOpenId;
      const liveTask = snap.live && c.id === liveId;
      // class list: task is the base; open/live add state. warn is a semantic hook only - it
      // carries no structural CSS; the warning shows via the amber pill on the name.
      const cls = "task"
        + (isOpen ? " open" : "")
        + (liveTask ? " live" : "")
        + (c.warnings.length ? " warn" : "");
      // bare duration, no "took" prefix - the rmeta slot is compact
      const dur = durLabel(c, snap);
      const durCls = liveTask ? "rmeta running" : "rmeta";
      const liveBadge = liveTask ? `<span class="livetag">Live</span>` : "";
      const body = isOpen
        ? `<div class="tbody">`
          + (c.narration ? `<div class="tlead">${esc(c.narration)}</div>` : "")
          + explainBlock("task", c.id)
          + receiptHtml(c, liveTask)
          + `</div>`
        : "";
      return `<div class="${cls} js-toggle" data-id="${c.id}" role="button" tabindex="0" aria-expanded="${isOpen}">`
        + `<span class="nm">${esc(c.name)} ${warningPill(c.warnings)}</span>`
        + liveBadge
        + `<span class="${durCls}">${dur}</span>`
        + `<span class="rtok">${fmt(c.workTotal)}</span>`
        + `<span class="go">&#9656;</span>`
        + body
        + `</div>`
        + (barWarning ? interventionBar(barWarning, c.id) : "");
    }

    // opts (Active Terminals panes): { follow, showEcho } overrides the single-view globals so a
    // pane uses its own Follow live state and still shows the summary echo. Omitted in the single view.
    function groupHtml(g, snap, barFor, opts) {
      const cards = g.chunks.map((c) => cardHtml(c, barFor(c), snap)).join("")
        || (g.live
          ? `<div class="grpnote think"><span class="pip"></span>Claude is thinking about your request…</div>`
          : `<div class="grpnote">Answered directly, no tools used.</div>`);
      // Eyebrow: live gets the pulsing dot, cancelled gets a quiet note, otherwise "You asked".
      const eyebrow = g.live
        ? `<div class="geye live"><span class="geye-dot"></span>Working now</div>`
        : g.cancelled
        ? `<div class="geye">You asked &middot; cancelled</div>`
        : `<div class="geye">You asked</div>`;
      // Meta one-liner: clock, duration, tokens, task count with dot separators.
      const clock = fmtClock(g.startTs);
      const dur = g.live ? liveTimer(g.startTs) : `<b>${fmtDur(g.durationMs || 0)}</b>`;
      const promptDur = g.live ? `running ${dur}` : `took ${dur}`;
      const metaLine = `<div class="pmeta">${clock}<span class="s">&bull;</span>${promptDur}<span class="s">&bull;</span><b>${fmt(g.workTotal)}</b> tok<span class="s">&bull;</span>${g.taskCount} task${g.taskCount === 1 ? "" : "s"}</div>`;
      // Heading echo: first sentence of cached summary, for skimming a completed prompt.
      const sumKey = ekey("summary", g.id);
      const sum = explCache.get(sumKey);
      const follow = opts ? opts.follow : followLive;
      const showEcho = opts ? opts.showEcho : (view === "single");
      const echo = (!g.live && sum && showEcho) ? `<div class="gecho">${esc(firstSentence(sum))}</div>` : "";
      const following = g.live && follow ? " following" : "";
      // When the user pressed Esc mid-turn, note it after the cards.
      const cancelNote = g.cancelled ? `<div class="grpcancel">&#9209; User cancelled Claude mid-prompt</div>` : "";
      const pmarkCls = "pmark" + (g.live ? " live" : "");
      return `<section class="grp${g.live ? " live" : ""}${g.cancelled ? " cancelled" : ""}${following}">`
        + `<div class="${pmarkCls}">${eyebrow}<div class="gtext">${esc(g.prompt)}</div>${metaLine}${echo}</div>`
        + `<div class="nodes">${cards}${cancelNote}${summaryBlock(g)}</div>`
        + `</section>`;
    }

    // Walks all receipt work lines and groups tokens into honest categories.
    // Returns { total, rows: [{label, tokens, pct}] } sorted by tokens descending.
    function tokenBreakdown(snap) {
      // Plain-language categories so a row reads as what Claude actually did, not a tool name.
      // Reading and editing are split out on purpose: "did it just look, or did it change files?"
      // is the first thing anyone wants to know from the breakdown.
      const buckets = { "Reading files": 0, "Writing files": 0, "Searching": 0, "Commands": 0, "Thinking": 0, "Other": 0 };
      for (const c of (snap.chunks || [])) {
        for (const line of (c.receipt && c.receipt.workLines || [])) {
          const t = line.tool || "";
          const tok = line.tokens || 0;
          if (t === "thinking") buckets["Thinking"] += tok;
          else if (t === "Read") buckets["Reading files"] += tok;
          else if (["Write", "Edit", "MultiEdit"].includes(t)) buckets["Writing files"] += tok;
          else if (["Grep", "Glob"].includes(t)) buckets["Searching"] += tok;
          else if (["Bash", "PowerShell"].includes(t)) buckets["Commands"] += tok;
          else buckets["Other"] += tok;
        }
      }
      const total = Object.values(buckets).reduce((a, b) => a + b, 0);
      const rows = Object.entries(buckets)
        .filter(([, v]) => v > 0)
        .sort(([, a], [, b]) => b - a)
        .map(([label, tokens]) => ({ label, tokens, pct: Math.round(tokens / total * 100) }));
      return { total, rows };
    }

    function renderSummary(snap) {
      // Derive the live task here so we don't depend on liveOpenId being set before this runs.
      const liveGroup = (snap.groups || []).find(g => g.live);
      const liveChunk = liveGroup && liveGroup.chunks.length
        ? liveGroup.chunks[liveGroup.chunks.length - 1] : null;

      const total = snap.taskCount || 0;
      const glyph = statsCollapsed ? "&laquo;" : "&raquo;";
      const expanded = !statsCollapsed;

      // --- Card 1: Right now ---
      // The green nowcard border is live-only: idle and warn states stay neutral (no green).
      const nowLive = snap.live && liveChunk && !snap.activeWarning;
      let nowCardInner;
      if (snap.activeWarning) {
        // Warn state: amber dot + stuck phrase
        nowCardInner =
          `<div class="stat" style="color:var(--warn)"><span class="d" style="background:var(--warn);box-shadow:0 0 6px rgba(224,162,58,.5);animation:none"></span>Needs a look</div>`
          + `<div class="doing" style="color:var(--body);font-weight:400">${esc(stuckPhrase(snap.activeWarning))}</div>`;
      } else if (snap.live && liveChunk) {
        const done = Math.max(0, total - 1);
        const pct = total ? Math.round(done / total * 100) : 0;
        nowCardInner =
          `<div class="stat"><span class="d"></span>Working</div>`
          + `<div class="doing">${esc(liveChunk.name)}</div>`
          + `<div class="el">on this task ${liveTimer(liveChunk.startTs)} &bull; session ${snap.startedAt ? liveTimer(snap.startedAt) : "running"}</div>`
          + `<div class="prog"><div class="pl">Session progress <b class="num">${done} / ${total} tasks</b></div>`
          + `<div class="bar"><i style="width:${pct}%"></i></div></div>`;
      } else {
        // Idle: calm non-green state, full progress bar
        const pct = total ? 100 : 0;
        const lastActive = snap.lastActivityAt
          ? "last active " + esc(ago(snap.lastActivityAt)) : "not running";
        nowCardInner =
          `<div class="stat idle"><span class="d"></span>Idle</div>`
          + `<div class="el">${lastActive}</div>`
          + `<div class="prog idle"><div class="pl">Session progress <b class="num">${total} / ${total} tasks</b></div>`
          + `<div class="bar"><i style="width:${pct}%"></i></div></div>`;
      }

      // --- Card 2: This session ---
      const sessDur = snap.live
        ? (snap.startedAt ? `${liveTimer(snap.startedAt)} <span class="dim">&bull; running</span>` : `<span class="dim">running</span>`)
        : fmtDur((snap.lastActivityAt || snap.startedAt || 0) - (snap.startedAt || 0));
      const prompts = (snap.groups || []).length;
      const bd = tokenBreakdown(snap);
      // One steady hue per category, reused across the stacked bar, legend swatch, and row bar so
      // the eye links them. Deliberately non-green: green is reserved for the single live thing.
      const colorFor = (label) => ({
        "Reading files": "var(--tok-read)", "Writing files": "var(--tok-edit)",
        "Searching": "var(--tok-search)", "Commands": "var(--tok-cmd)",
        "Thinking": "var(--tok-reason)", "Other": "var(--tok-other)",
      }[label] || "var(--tok-other)");
      // A category with real tokens but a sub-1% share shows "<1%" rather than a bare "0%", and
      // keeps a visible sliver in the bar (min-width), so nothing tiny reads as empty.
      const pctText = (p) => (p < 1 ? "<1%" : p + "%");
      const barW = (p) => Math.max(p, 1.5);
      const stackBar = bd.rows.length
        ? `<div class="tokbar">` + bd.rows.map(r =>
            `<i style="width:${barW(r.pct)}%;background:${colorFor(r.label)}" title="${esc(r.label)} ${pctText(r.pct)}"></i>`).join("") + `</div>`
        : "";
      const brkRows = bd.rows.length
        ? bd.rows.map(r => {
            const c = colorFor(r.label);
            // One clean line per category: chip, label, then count and percent right-aligned. The
            // stacked bar above carries the visual share, so the row stays a plain receipt line.
            return `<div class="brkrow">`
              + `<span class="sw" style="background:${c}"></span>`
              + `<span class="bn">${esc(r.label)}</span>`
              + `<span class="bc num">${kfmt(r.tokens)}<small>tok</small></span>`
              + `<span class="pct num">${pctText(r.pct)}</span>`
              + `</div>`;
          }).join("")
        : `<div class="tokempty">No token activity yet.</div>`;

      // Priciest task sits in its own row below the breakdown: a small label, then the task name
      // (truncated) on the left and its spend on the right, so it reads as a separate receipt line.
      const priciest = snap.priciestTaskName
        ? `<div class="tokfoot"><div class="pl">Priciest task</div>`
          + `<div class="pr"><span class="pn">${esc(snap.priciestTaskName)}</span>`
          + `<span class="pt num">${kfmt(snap.priciestTaskWork)}<small>tok</small></span></div></div>` : "";

      document.getElementById("summary").innerHTML =
        `<div class="sidehd"><span class="t">Session stats</span>`
        + `<button class="tog" id="stats-tog" type="button" aria-label="${expanded ? "Collapse" : "Expand"} stats" aria-expanded="${expanded}">${glyph}</button></div>`
        + `<div class="statsbody">`
        + `<div class="scard${nowLive ? " nowcard" : ""}" aria-live="polite"><div class="k">Right now</div>${nowCardInner}</div>`
        + `<div class="scard"><div class="k">This session</div>`
        + `<div class="pair"><span class="l">Total duration</span><span class="v num">${sessDur}</span></div>`
        + `<div class="pair"><span class="l">Prompts</span><span class="v num">${prompts}</span></div>`
        + `<div class="pair"><span class="l">Tasks</span><span class="v num">${total}</span></div>`
        + `<div class="pair"><span class="l">Total tokens</span><span class="v num">${fmt(bd.total)}</span></div>`
        + `</div>`
        + `<div class="scard tokcard"><div class="tokhd"><span class="k">Token breakdown</span>`
        + `<span class="toktot">${kfmt(bd.total)}<small>tok</small></span></div>`
        + `<div class="toksub">Where your tokens went</div>`
        + stackBar
        + `<div class="brk">${brkRows}</div>`
        + priciest
        + `</div></div>`;

      // Apply collapse class and wire the toggle (survives per-tick re-render via JS state var).
      const aside = document.getElementById("summary");
      aside.classList.toggle("collapsed", statsCollapsed);
      const tog = document.getElementById("stats-tog");
      if (tog) {
        tog.onclick = () => {
          statsCollapsed = !statsCollapsed;
          localStorage.setItem("codey-stats-collapsed", statsCollapsed ? "1" : "0");
          aside.classList.toggle("collapsed", statsCollapsed);
          tog.innerHTML = statsCollapsed ? "&laquo;" : "&raquo;";
          tog.setAttribute("aria-expanded", String(!statsCollapsed));
          tog.setAttribute("aria-label", (statsCollapsed ? "Expand" : "Collapse") + " stats");
        };
      }
    }

    function renderHeader(snap) {
      document.getElementById("sname").textContent = snap.sessionName;
      const el = document.getElementById("sproj");
      el.innerHTML = `<span class="cdot${snap.live ? " run" : ""}" style="background:${esc(snap.color || "#5fb0ff")}"></span>`
        + (snap.project ? `<span class="ptag">${esc(snap.project)}</span>` : "");
    }

    function sessRowHtml(s) {
      const active = s.id === currentId ? " active" : "";
      const proj = s.project ? ` &middot; ${esc(s.project)}` : "";
      if (s.id === renamingId) {
        return `<div class="sessrename" data-id="${esc(s.id)}">`
          + `<input class="rename-in" type="text" value="${esc(s.name)}" aria-label="New name" /></div>`;
      }
      return `<button class="sess${active}" data-id="${esc(s.id)}" type="button">`
        + `<span class="sname"><span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>${esc(s.name)}</span>`
        + `<span class="smeta">${ago(s.mtime)} &middot; ${s.taskCount} task${s.taskCount === 1 ? "" : "s"}${proj}</span>`
        + `</button>`;
    }

    // True when a session's time falls inside the From/To date filter (either bound may be open).
    function inDateRange(s) {
      const from = dateFrom ? new Date(dateFrom + "T00:00:00").getTime() : null;
      const to = dateTo ? new Date(dateTo + "T23:59:59.999").getTime() : null;
      if (from != null && s.mtime < from) return false;
      if (to != null && s.mtime > to) return false;
      return true;
    }

    function updateDateSummary() {
      const sum = document.getElementById("datesummary");
      if (!sum) return;
      const active = dateFrom || dateTo;
      sum.classList.toggle("on", !!active);
      sum.textContent = active ? `Dates: ${dateFrom || "any"} to ${dateTo || "any"}` : "Filter by date";
    }

    // Build the rail's static shell once: the search box and date filter must be stable elements
    // so typing in them is never interrupted by a list refresh. The list itself lives in #raillist
    // and is the only part that re-renders on each poll.
    function ensureRailShell() {
      if (railWired) return;
      document.getElementById("rail").innerHTML =
        `<p class="rh">Sessions</p>`
        + `<input class="railsearch" id="railsearch" type="search" placeholder="Search terminals" autocomplete="off" />`
        + `<details class="datefilter" id="datefilter"><summary id="datesummary">Filter by date</summary>`
        + `<div class="daterow">`
        + `<label class="dlab">From<input type="date" id="date-from" class="dinput" /></label>`
        + `<label class="dlab">To<input type="date" id="date-to" class="dinput" /></label></div>`
        + `<button class="dclear" id="date-clear" type="button">Clear dates</button></details>`
        + `<div id="raillist"></div>`;

      const search = document.getElementById("railsearch");
      search.value = railFilter;
      search.addEventListener("input", (e) => { railFilter = e.target.value; renderRailList(lastSessions); });

      const from = document.getElementById("date-from");
      const to = document.getElementById("date-to");
      from.value = dateFrom; to.value = dateTo;
      from.addEventListener("change", (e) => { dateFrom = e.target.value; updateDateSummary(); renderRailList(lastSessions); });
      to.addEventListener("change", (e) => { dateTo = e.target.value; updateDateSummary(); renderRailList(lastSessions); });
      document.getElementById("date-clear").addEventListener("click", () => {
        dateFrom = ""; dateTo = ""; from.value = ""; to.value = "";
        updateDateSummary(); renderRailList(lastSessions);
      });
      updateDateSummary();
      railWired = true;
    }

    function renderRail(sessions) {
      ensureRailShell();
      renderRailList(sessions);
    }

    // Re-render just the session list (never the inputs), grouped by day.
    function renderRailList(sessions) {
      const list = document.getElementById("raillist");
      if (!list) return;
      const q = railFilter.trim().toLowerCase();
      const shown = sessions.filter((s) =>
        (!q || (s.name + " " + (s.project || "")).toLowerCase().includes(q)) && inDateRange(s));
      // Group by day, preserving the most-recent-first order the server already sorted by.
      const days = [];
      const byDay = new Map();
      for (const s of shown) {
        const d = s.day || "Earlier";
        if (!byDay.has(d)) { byDay.set(d, []); days.push(d); }
        byDay.get(d).push(s);
      }
      const groups = days.map((d) => {
        const rows = byDay.get(d);
        return `<div class="dayhd">${esc(d)}<span class="dcount">${rows.length}</span></div>`
          + rows.map(sessRowHtml).join("");
      }).join("");
      const empty = (q || dateFrom || dateTo) ? "No terminals match." : "No terminals yet.";
      list.innerHTML = shown.length ? groups : `<p class="smeta" style="padding-left:3px">${empty}</p>`;

      list.querySelectorAll(".sess").forEach((el) => {
        el.addEventListener("click", () => {
          currentId = el.dataset.id; pinned = true; followLive = true;
          open.clear(); closedByUser.clear(); tickSingle(); tickNow();
        });
      });

      const input = list.querySelector(".rename-in");
      if (input) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        const commit = () => commitRename(renamingId, input.value);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          else if (e.key === "Escape") { e.preventDefault(); renamingId = null; renderRailList(lastSessions); }
        });
        input.addEventListener("blur", commit);
      }
    }

    function startRename(id) { renamingId = id; renderRailList(lastSessions); }

    async function commitRename(id, name) {
      if (!id) return;
      renamingId = null;
      try {
        await fetch("/api/session/" + encodeURIComponent(id) + "/name", {
          method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name }),
        });
      } catch { /* keep going; the rail will refetch on the next tick */ }
      tickSingle();
    }

    async function deleteSession(id) {
      const s = lastSessions.find((x) => x.id === id);
      if (!confirm("Delete " + (s ? s.name : "this terminal") + " from the timeline? This cannot be undone.")) return;
      try { await fetch("/api/session/" + encodeURIComponent(id), { method: "DELETE" }); } catch { /* refetch handles it */ }
      if (currentId === id) { currentId = null; pinned = false; }
      tickSingle();
    }

    function renderSingle(snap) {
      lastSnap = snap;
      liveNow = !!snap.live;
      if (depth === null) { depth = snap.seedDepth || "deep"; applyMode(); }
      if (genMode === null) genMode = snap.genAuto ? "auto" : "saver";
      seedEmbedded(snap);
      renderHeader(snap);
      renderControls(snap);
      renderSummary(snap);
      const chunks = snap.chunks || [];
      const groups = snap.groups || [];
      // The running task is the last task of the live prompt group, auto-opened below. Scoping to
      // the live group (not the last task overall) keeps a new prompt from lighting up the previous
      // prompt's trailing step: a fresh group has no tasks yet, so nothing reads as "running now".
      const liveGroup = groups.find((g) => g.live);
      const liveChunks = liveGroup ? liveGroup.chunks : (groups.length ? [] : chunks);
      liveOpenId = snap.live && liveChunks.length ? liveChunks[liveChunks.length - 1].id : null;
      // A fresh prompt re-engages Follow Live: if the live group changed since the last render,
      // the user just sent a new prompt, so snap back to following its work even if they had
      // scrolled up to read the previous turn.
      if (liveGroup && liveGroup.id !== lastLiveGroupId) {
        lastLiveGroupId = liveGroup.id;
        followLive = true;
      } else if (!liveGroup) {
        lastLiveGroupId = null;
      }
      const main = document.getElementById("main");
      if (!snap.activeWarning) confirmed.clear();
      const lastId = chunks.length ? chunks[chunks.length - 1].id : null;
      const barFor = (c) => (snap.live && snap.activeWarning && c.id === lastId ? snap.activeWarning : null);

      // Wrap in .feed for the continuous spine; empty state does not get the wrapper.
      main.innerHTML = groups.length
        ? '<div class="feed">' + groups.map((g) => groupHtml(g, snap, barFor)).join("") + "</div>"
        : (chunks.length
          ? '<div class="feed">' + chunks.map((c) => cardHtml(c, barFor(c), snap)).join("") + "</div>"
          : '<div class="empty">No activity recorded for this session yet.</div>');

      wireCards(main, () => renderSingle(snap));
      wireIntervention(main);
      wireGenerate(main, () => renderSingle(snap));
      maybeAutoSummary(snap);
    }

    // Wire every "Explain"/"Why"/"Summarize" button to its generation request.
    function wireGenerate(scope, rerender) {
      scope.querySelectorAll("[data-gen-scope]").forEach((b) => b.addEventListener("click", (e) => {
        e.stopPropagation();
        generate(b.dataset.genScope, b.dataset.genId, rerender, b.dataset.genDepth);
      }));
    }

    // In Auto, generate the recap for the single most-recently-finished prompt, once per depth.
    // Everything else (older summaries, all task and action explanations) stays click-to-generate.
    function maybeAutoSummary(snap) {
      if (genMode !== "auto" || budgetPaused) return;
      const completed = (snap.groups || []).filter((g) => !g.live);
      const target = completed[completed.length - 1];
      if (!target) return;
      const key = ekey("summary", target.id);
      if (explCache.has(key) || explLoading.has(key) || autoFired.has(key)) return;
      autoFired.add(key);
      setTimeout(() => generate("summary", target.id), 0);
    }

    // Shared expand/collapse wiring for task rows, used by both Single and Active Terminals.
    function wireCards(scope, rerender) {
      const wire = (sel, fn) => scope.querySelectorAll(sel).forEach((el) => {
        const run = () => { fn(el); rerender(); };
        el.addEventListener("click", (e) => { e.stopPropagation(); run(); });
        el.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); run(); } });
      });
      // .js-toggle is on the .task div itself; el.dataset.id holds the chunk id.
      wire(".js-toggle", (el) => {
        const id = el.dataset.id;
        if (!id) return;
        // Toggle against what is actually showing, so collapsing the auto-opened live task sticks.
        if (isCardOpen(id)) { open.delete(id); closedByUser.add(id); }
        else { open.add(id); closedByUser.delete(id); }
      });
      wire(".js-work", (el) => { const id = el.dataset.id; workCollapsed.has(id) ? workCollapsed.delete(id) : workCollapsed.add(id); });
      wire(".rline.can", (el) => { const k = el.dataset.line; lineOpen.has(k) ? lineOpen.delete(k) : lineOpen.add(k); });
      wire(".rline.brow", (el) => { const k = el.dataset.burst; burstOpen.has(k) ? burstOpen.delete(k) : burstOpen.add(k); });
      wire(".rawbtn", (el) => { const k = el.dataset.raw; rawOpen.has(k) ? rawOpen.delete(k) : rawOpen.add(k); });
    }

    function wireIntervention(scope) {
      scope.querySelectorAll(".intervene").forEach((barEl) => {
        const tool = barEl.dataset.tool;
        barEl.querySelectorAll(".ibtn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            barEl.querySelectorAll(".ibtn").forEach((b) => (b.disabled = true));
            try {
              await fetch("/api/session/" + encodeURIComponent(currentId) + "/intervene", {
                method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action }),
              });
            } catch { /* the Esc path is the real stop */ }
            confirmed.set(barEl.dataset.chunk, action);
            tickSingle();
          });
        });
        const copyBtn = barEl.querySelector(".copybtn");
        if (copyBtn) copyBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          navigator.clipboard?.writeText(FALLBACK[barEl.dataset.action].type.replace("{tool}", tool));
          copyBtn.textContent = "Copied";
        });
      });
    }

    // ---- polling ----
    async function tickSingle() {
      let sessions = [];
      try { sessions = await (await fetch("/api/sessions")).json(); } catch { sessions = []; }
      if (view !== "single") return; // a view switch landed while this fetch was in flight
      lastSessions = sessions;
      if (!pinned && sessions[0]) currentId = sessions[0].id;
      const anyRunning = sessions.some((s) => s.running);
      updateLiveBadge(sessions.filter((s) => s.running).length);
      // Don't redraw the rail mid-rename or the input loses focus and the typed text.
      if (!renamingId) renderRail(sessions);
      // Only offer "Jump to live" when there is something live to jump to.
      document.getElementById("jumplive").hidden = !(pinned && anyRunning);
      if (!currentId) { document.getElementById("main").innerHTML = '<div class="empty">No sessions found.</div>'; return; }
      try {
        const snap = await (await fetch("/api/session/" + encodeURIComponent(currentId))).json();
        if (view !== "single") return;
        renderSingle(snap);
      } catch { /* keep last view on a transient error */ }
    }

    document.getElementById("jumplive").addEventListener("click", () => {
      pinned = false; document.getElementById("jumplive").hidden = true; tick();
    });
    document.getElementById("tb-single").addEventListener("click", () => setView("single"));
    document.getElementById("tb-split").addEventListener("click", () => setView("split"));
    document.getElementById("rename-current").addEventListener("click", () => {
      if (currentId) startRename(currentId);
    });
    document.getElementById("delete-current").addEventListener("click", () => {
      if (currentId) deleteSession(currentId);
    });
    function setView(v) {
      view = v;
      document.body.classList.toggle("split", v === "split");
      document.getElementById("tb-single").classList.toggle("on", v === "single");
      document.getElementById("tb-split").classList.toggle("on", v === "split");
      document.getElementById("rail").style.display = v === "split" ? "none" : "";
      document.getElementById("summary").style.display = v === "split" ? "none" : "";
      document.getElementById("jumplive").hidden = true;
      renderNow(view === "single" ? nowState : null);
      // Paint the target view from cache immediately so the previous view's content never lingers
      // or flashes while the fresh data is in flight.
      const main = document.getElementById("main");
      if (v === "split") {
        if (lastLive) renderSplit(lastLive); else main.innerHTML = '<div class="empty">Loading…</div>';
      } else {
        if (lastSnap) renderSingle(lastSnap); else main.innerHTML = '<div class="empty">Loading…</div>';
      }
      tick();
    }

    function updateLiveBadge(n) {
      document.getElementById("livecount").textContent = n;
      const wrap = document.getElementById("livewrap");
      // Always visible: when 0 it shows a calm "idle" state so a still badge never looks frozen.
      wrap.classList.toggle("idle", n === 0);
      document.getElementById("livelabel").textContent = n === 0 ? "idle" : "live";
    }

    // ---- Active Terminals (multi-session) ----
    // Two full-size terminals side by side per page; the pager walks the rest. Bounded so a
    // machine with many open terminals does not re-render dozens of full receipts every tick.
    const SPLIT_PER_PAGE = 2;
    let lastLive = null; // keep the last payload so pager clicks re-render without a refetch
    // Each pane runs its own Follow live, independent of the others and of the single view: one
    // terminal can follow its live work while another stays parked where the user is reading.
    const paneFollow = {};       // sessionId -> bool (absent = following by default)
    const paneLiveGroupId = {};  // sessionId -> last live group id, to re-engage follow on a new prompt
    const paneFollowOn = (sid) => paneFollow[sid] !== false;
    // Each pane carries its own explanation depth so one terminal can read Simple while another
    // reads Deep, with no swapping. Absent -> fall back to that session's seed depth, then "deep".
    const paneDepth = {};        // sessionId -> "simple" | "deep" | "teach"
    const paneDepthOn = (sid, seed) => paneDepth[sid] || seed || "deep";

    async function dismissTerminal(id) {
      try { await fetch("/api/session/" + encodeURIComponent(id) + "/dismiss", { method: "POST" }); } catch { /* refetch handles it */ }
      tickSplit();
    }
    async function restoreTerminal(id) {
      try { await fetch("/api/session/" + encodeURIComponent(id) + "/restore", { method: "POST" }); } catch { /* refetch handles it */ }
      tickSplit();
    }

    // The "Hidden (N)" tray: dismissed terminals offered back for restore. Empty -> nothing shown.
    function hiddenTrayHtml(hidden) {
      if (!hidden || hidden.length === 0) return "";
      const chips = hidden.map((h) =>
        `<span class="hidchip"><span class="hcdot" style="background:${esc(h.color || "#5fb0ff")}"></span>${esc(h.name)}`
        + `<button type="button" data-restore="${esc(h.sessionId)}">Restore</button></span>`).join("");
      return `<div class="hiddentray"><span class="htlab">Hidden (${hidden.length}):</span>${chips}</div>`;
    }

    function paneHtml(s, isFirst) {
      const sid = s.sessionId;
      // A pane is "live" (amber frame) whenever the terminal is running: mid-tool OR thinking.
      // A cancelled turn gets a quiet amber frame too, so an interrupted terminal reads as such.
      const cls = "pane" + (s.running ? " run" : "") + (s.cancelled && !s.running ? " cancelled" : "");
      const pill = s.thinking ? `<span class="badge think">&#9670; Thinking</span>`
        : isFirst && s.running ? `<span class="badge">&#10022; Just prompted</span>` : "";
      const proj = s.project ? `<span class="pproj">${esc(s.project)}</span>` : "";
      const dismissBtn = `<button class="pdismiss" type="button" data-dismiss="${esc(sid)}" title="Hide this terminal" aria-label="Hide this terminal">&times;</button>`;
      // Full prompt history, oldest on top, newest below: a pane is a real single-terminal timeline,
      // not a single overwriting receipt. Namespace each group and chunk id with the session so
      // expand state and "Summarize"/"Explain" requests route to this terminal, never a neighbour.
      const groups = (s.groups || []).map((g) => ({
        ...g, id: sid + "~" + g.id,
        chunks: g.chunks.map((c) => ({ ...c, id: sid + "~" + c.id })),
      }));
      // A new prompt re-engages this pane's Follow live, exactly like the single view: when the live
      // group id changes, snap back to following even if the user had scrolled up to read earlier.
      const liveGroup = groups.find((g) => g.live);
      if (liveGroup && paneLiveGroupId[sid] !== liveGroup.id) {
        paneLiveGroupId[sid] = liveGroup.id;
        paneFollow[sid] = true;
      } else if (!liveGroup) {
        paneLiveGroupId[sid] = null;
      }
      // The pane's one live task (last task of its live group), so cardHtml lights the right row.
      const liveChunks = liveGroup ? liveGroup.chunks : [];
      const liveChunkId = s.running && liveChunks.length ? liveChunks[liveChunks.length - 1].id : null;
      const follow = paneFollowOn(sid);
      const pd = paneDepthOn(sid, s.seedDepth);
      // Pseudo-snapshot for the shared card/group renderers: this pane's own live flag and live row.
      const lastFinite = groups.reduce((m, g) => Math.max(m, g.endTs < 1e15 ? g.endTs : g.startTs), 0) || Date.now();
      const pseudo = { live: s.running, lastActivityAt: lastFinite, liveChunkId };
      const barNone = () => null; // panes carry no intervention warnings

      // Build this pane's body under its own depth so every Explain/Summarize block keys and labels
      // at the pane's depth. Reset to null right after, so the next pane (or the single view) is clean.
      renderDepth = pd;
      let body;
      if (groups.length) {
        body = `<div class="feed">`
          + groups.map((g) => groupHtml(g, pseudo, barNone, { follow, showEcho: true })).join("")
          + `</div>`;
      } else if (s.thinking) {
        body = `<div class="pthink"><span class="pip"></span>Thinking about your request…</div>`;
      } else if (s.cancelled) {
        body = `<div class="grpcancel">&#9209; User cancelled Claude mid-prompt</div>`;
      } else {
        body = `<div class="pnote"><span class="pn1">Answered directly</span>No tools used for this prompt.</div>`;
      }
      renderDepth = null;
      // Per-pane Follow live toggle, shown only while the terminal is live. Off keeps the user's
      // scroll put; the "Jump to live" affordance below surfaces when new work lands out of view.
      const followBtn = s.running
        ? `<button class="pfollow${follow ? " on" : ""}" type="button" data-follow="${esc(sid)}">`
          + `<span class="fd"></span>${follow ? "Following" : "Follow live"}</button>` : "";
      const jump = s.running
        ? `<button class="pjump" type="button" data-jump="${esc(sid)}" hidden>New live activity &#8595;</button>` : "";
      // This pane's own depth control: Simple/Deep/Teach, scoped to this terminal only.
      const dseg = (val, lab) => `<button class="${val === pd ? "on" : ""}" type="button" data-pdepth="${esc(sid)}" data-pd-val="${val}">${lab}</button>`;
      const depthCtl = `<span class="pdepth"><span class="pdl">Depth</span><span class="pseg">`
        + dseg("simple", "Simple") + dseg("deep", "Deep") + dseg("teach", "Teach") + `</span></span>`;
      return `<div class="${cls}" data-sid="${esc(sid)}"><div class="phead">`
        + `<span class="cdot${s.running ? " run" : ""}" style="background:${esc(s.color || "#5fb0ff")}"></span>`
        + `<span class="pname">${esc(s.name)}</span>${proj}${pill}`
        + `<span class="pwork"><b>${fmt(s.workTotal)}</b> tokens</span>${depthCtl}${followBtn}${dismissBtn}</div>`
        + `<div class="pbody" data-sid="${esc(sid)}">${body}</div>${jump}</div>`;
    }

    // Locate a pane by session id without trusting the id in a CSS selector.
    function paneEl(sid) {
      return [...document.querySelectorAll(".pane[data-sid]")].find((p) => p.dataset.sid === sid) || null;
    }
    const paneAtBottom = (body) => body.scrollHeight - (body.scrollTop + body.clientHeight) < 28;

    // Read each pane's current scroll before a re-render so a parked pane can be put back exactly,
    // instead of snapping to the top every tick when its innerHTML is replaced.
    function capturePaneScroll() {
      const map = {};
      document.querySelectorAll(".pbody[data-sid]").forEach((el) => { map[el.dataset.sid] = el.scrollTop; });
      return map;
    }
    // After a re-render: a following live pane sticks to the bottom; every other pane is restored
    // to where the user left it. Then refresh each pane's "Jump to live" affordance.
    function applyPaneScroll(saved) {
      document.querySelectorAll(".pbody[data-sid]").forEach((el) => {
        const sid = el.dataset.sid;
        const pane = el.closest(".pane");
        const running = pane && pane.classList.contains("run");
        if (running && paneFollowOn(sid)) el.scrollTop = el.scrollHeight;
        else if (sid in saved) el.scrollTop = saved[sid];
        updateJump(sid);
      });
    }
    // Show the affordance only when a pane is live, not following, and parked away from the bottom.
    function updateJump(sid) {
      const pane = paneEl(sid);
      if (!pane) return;
      const body = pane.querySelector(".pbody");
      const jump = pane.querySelector(".pjump");
      if (!body || !jump) return;
      const running = pane.classList.contains("run");
      jump.hidden = !(running && !paneFollowOn(sid) && !paneAtBottom(body));
    }
    // Paint one pane's Follow live button + live-group state and (if following) snap it to the live edge.
    function paintPaneFollow(sid) {
      const pane = paneEl(sid);
      if (!pane) return;
      const on = paneFollowOn(sid);
      const btn = pane.querySelector(".pfollow");
      if (btn) { btn.classList.toggle("on", on); btn.innerHTML = `<span class="fd"></span>${on ? "Following" : "Follow live"}`; }
      pane.querySelectorAll(".grp.live").forEach((g) => g.classList.toggle("following", on));
      const body = pane.querySelector(".pbody");
      if (on && body) body.scrollTop = body.scrollHeight;
      updateJump(sid);
    }
    // Follow live is exclusive: only one terminal follows at a time. Turning one on parks every
    // other running pane, so the live edge the user is watching is unambiguous. Turning one off
    // just parks that pane and leaves the rest alone.
    function setPaneFollow(sid, on) {
      paneFollow[sid] = on;
      if (on) {
        document.querySelectorAll(".pane.run[data-sid]").forEach((pane) => {
          const other = pane.dataset.sid;
          if (other && other !== sid && paneFollowOn(other)) {
            paneFollow[other] = false;
            paintPaneFollow(other);
          }
        });
      }
      paintPaneFollow(sid);
    }
    // Switch one pane's depth and re-render so its explanations re-key and relabel at the new depth.
    function setPaneDepth(sid, d) {
      if (paneDepth[sid] === d) return;
      paneDepth[sid] = d;
      renderSplit(lastLive);
    }
    // Wire each pane's follow toggle, jump button, and scroll/wheel behaviour. A deliberate scroll
    // up in a pane means "let me read", so it parks that pane (and only that pane).
    function wirePanes(main) {
      main.querySelectorAll("[data-pdepth]").forEach((b) =>
        b.addEventListener("click", (e) => { e.stopPropagation(); setPaneDepth(b.dataset.pdepth, b.dataset.pdVal); }));
      main.querySelectorAll("[data-follow]").forEach((b) =>
        b.addEventListener("click", (e) => { e.stopPropagation(); setPaneFollow(b.dataset.follow, !paneFollowOn(b.dataset.follow)); }));
      main.querySelectorAll("[data-jump]").forEach((b) =>
        b.addEventListener("click", (e) => { e.stopPropagation(); setPaneFollow(b.dataset.jump, true); }));
      main.querySelectorAll(".pbody[data-sid]").forEach((el) => {
        el.addEventListener("wheel", (e) => {
          if (e.deltaY < 0 && paneFollowOn(el.dataset.sid)) setPaneFollow(el.dataset.sid, false);
        }, { passive: true });
        el.addEventListener("scroll", () => updateJump(el.dataset.sid), { passive: true });
      });
    }

    function renderSplit(live) {
      const savedScroll = capturePaneScroll();
      const sessions = live.sessions;
      liveNow = live.liveCount > 0;
      updateLiveBadge(live.liveCount);
      document.getElementById("sname").textContent = "Active terminals";
      const main = document.getElementById("main");
      const tray = hiddenTrayHtml(live.hidden);
      if (sessions.length === 0) {
        main.innerHTML = '<div class="splitwrap">' + tray
          + '<div class="empty">No terminals are open right now. Prompt Claude in any terminal to see it appear here.</div></div>';
        wireSplitControls(main);
        return;
      }
      const pages = Math.max(1, Math.ceil(sessions.length / SPLIT_PER_PAGE));
      if (!splitPinned) splitPage = 1;          // follow the front until the user pages
      splitPage = Math.min(Math.max(1, splitPage), pages);
      const start = (splitPage - 1) * SPLIT_PER_PAGE;
      const pageItems = sessions.slice(start, start + SPLIT_PER_PAGE);

      const stack = pageItems.map((s) => paneHtml(s, splitPage === 1 && s === sessions[0])).join("");
      const dots = Array.from({ length: pages }, (_, i) => `<span class="dot${i + 1 === splitPage ? " on" : ""}"></span>`).join("");
      const pager = pages > 1
        ? `<div class="pager"><button class="nav" id="pg-prev" type="button"${splitPage === 1 ? " disabled" : ""}>&#8249;</button>`
          + `<div class="dots">${dots}</div>`
          + `<button class="nav" id="pg-next" type="button"${splitPage === pages ? " disabled" : ""}>&#8250;</button>`
          + `<span class="prange">Page ${splitPage} of ${pages}</span></div>`
        : "";
      // Controls (pager + hidden tray) pinned above; the two panes fill the row below. A lone
      // pane on the last page spans the full width instead of leaving an empty column.
      const solo = pageItems.length === 1 ? " solo" : "";
      main.innerHTML = `<div class="splitwrap">${pager}${tray}<div class="tstack${solo}">${stack}</div></div>`;

      const prev = document.getElementById("pg-prev");
      const next = document.getElementById("pg-next");
      if (prev) prev.addEventListener("click", () => { splitPinned = true; splitPage--; renderSplit(lastLive); });
      if (next) next.addEventListener("click", () => { splitPinned = true; splitPage++; renderSplit(lastLive); });
      wireSplitControls(main);
      wireCards(main, () => renderSplit(lastLive));
      wireGenerate(main, () => renderSplit(lastLive));
      wirePanes(main);
      applyPaneScroll(savedScroll);
    }

    // Wire the dismiss (X) buttons and the hidden-tray restore buttons.
    function wireSplitControls(main) {
      main.querySelectorAll("[data-dismiss]").forEach((el) =>
        el.addEventListener("click", (e) => { e.stopPropagation(); dismissTerminal(el.dataset.dismiss); }));
      main.querySelectorAll("[data-restore]").forEach((el) =>
        el.addEventListener("click", (e) => { e.stopPropagation(); restoreTerminal(el.dataset.restore); }));
    }

    function tick() { if (view === "single") return tickSingle(); return tickSplit(); }
    async function tickSplit() {
      try {
        const live = await (await fetch("/api/live")).json();
        if (view !== "split") return; // a view switch landed while this fetch was in flight
        lastLive = live;
        renderSplit(lastLive);
      } catch { /* keep the last view on a transient error */ }
    }

    // Tick live elapsed timers once a second between the 2s data polls, so running tasks,
    // groups and the session timer count up smoothly without hammering the server.
    setInterval(() => {
      document.querySelectorAll(".timer[data-since]").forEach((el) => {
        const since = Number(el.dataset.since);
        if (since > 0) el.textContent = fmtDur(Date.now() - since);
      });
    }, 1000);

    // Self-scheduling poll: ~0.9s while something is live so the current step and receipts keep
    // pace with Claude, easing to ~1.2s when idle. The idle gap is kept short on purpose so a fresh
    // prompt's "thinking" state pops up almost at once in Active Terminals (the single view's NOW
    // strip already polls faster). Re-scheduled after each tick so a slow fetch never stacks requests.
    async function tickLoop() {
      try { await tick(); } catch { /* keep the loop alive on a transient error */ }
      setTimeout(tickLoop, liveNow ? 900 : 1200);
    }
    tickLoop();
    // The NOW strip polls a cheap endpoint a bit under once a second so the current step and the
    // quick steps in its trail feel live, without fetching the full snapshot that often.
    tickNow();
    setInterval(tickNow, 600);
  </script>
</body>
</html>
